<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0e27;
      font-family: 'Poppins', sans-serif;
      color: #f1f5f9;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient Orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: orbFadeIn 2s ease forwards;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: #6366f1;
      top: -80px; right: -60px;
      animation-delay: 0.3s;
    }
    .orb-2 {
      width: 380px; height: 380px;
      background: #ec4899;
      bottom: -100px; left: -80px;
      animation-delay: 0.6s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: #06b6d4;
      top: 50%; right: 5%;
      transform: translateY(-50%);
      animation-delay: 0.9s;
    }

    @keyframes orbFadeIn {
      from { opacity: 0; transform: scale(0.6); }
      to { opacity: 0.4; transform: scale(1); }
    }

    /* ── Floating Particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(99, 102, 241, 0.6);
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    .particle:nth-child(odd) {
      background: rgba(236, 72, 153, 0.5);
    }
    .particle:nth-child(3n) {
      background: rgba(6, 182, 212, 0.5);
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── Grid Lines Background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
              linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ── Scanning Line ── */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6366f1, #ec4899, #06b6d4, transparent);
      z-index: 2;
      animation: scanDown 3s ease-in-out infinite;
      opacity: 0.5;
      filter: blur(1px);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    @keyframes scanDown {
      0% { top: -2px; }
      100% { top: 100vh; }
    }

    /* ── Main Container ── */
    .welcome-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* ── Logo Ring ── */
    .logo-ring {
      width: 120px;
      height: 120px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: logoAppear 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .logo-ring .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #6366f1;
      border-right-color: #8b5cf6;
      animation: spinRing 2s linear infinite;
    }

    .logo-ring .ring-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: #ec4899;
      border-left-color: #06b6d4;
      animation: spinRing 1.5s linear infinite reverse;
    }

    .logo-ring .ring-core {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring .ring-core svg {
      width: 32px;
      height: 32px;
      color: #6366f1;
      filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4));
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    @keyframes logoAppear {
      from { opacity: 0; transform: scale(0.3) rotate(-90deg); }
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── Welcome Card ── */
    .welcome-box {
      text-align: center;
      padding: 50px 70px;
      background: rgba(15, 23, 42, 0.7);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,0.1),
              0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      animation: cardSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
      position: relative;
      overflow: hidden;
      max-width: 520px;
      width: 90vw;
    }

    .welcome-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.05), transparent);
      animation: shimmerCard 3s ease-in-out 2s infinite;
    }

    @keyframes shimmerCard {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Title with letter animation ── */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      display: inline-block;
    }

    .title .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      animation: charDrop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes charDrop {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeInSub 1s ease 2s forwards;
    }

    @keyframes fadeInSub {
      from { opacity: 0; letter-spacing: 12px; }
      to { opacity: 1; letter-spacing: 4px; }
    }

    /* ── Divider ── */
    .divider {
      width: 80px;
      height: 2px;
      margin: 0 auto 30px;
      background: linear-gradient(90deg, transparent, #6366f1, #8b5cf6, #ec4899, transparent);
      border-radius: 2px;
      opacity: 0;
      animation: dividerGrow 1s ease 2.2s forwards;
    }

    @keyframes dividerGrow {
      from { opacity: 0; width: 0; }
      to { opacity: 1; width: 80px; }
    }

    /* ── Loading Bar ── */
    .loading-section {
      opacity: 0;
      animation: fadeIn 0.8s ease 2.5s forwards;
    }

    .loading-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: #475569;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .loading-track {
      width: 100%;
      height: 4px;
      background: rgba(10, 14, 27, 0.5);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
      border-radius: 4px;
      animation: loadBar 2.5s ease 2.8s forwards;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
      position: relative;
    }

    .loading-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ec4899;
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.6);
    }

    @keyframes loadBar {
      to { width: 100%; }
    }

    .loading-percent {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: #6366f1;
      margin-top: 12px;
      letter-spacing: 2px;
    }

    /* ── Status dots ── */
    .status-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.5s forwards;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366f1;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .status-dot:nth-child(2) {
      background: #8b5cf6;
      animation-delay: 0.2s;
    }
    .status-dot:nth-child(3) {
      background: #ec4899;
      animation-delay: 0.4s;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.6); }
    }

    /* ── Corner Decorations ── */
    .corner-deco {
      position: fixed;
      width: 80px;
      height: 80px;
      z-index: 5;
      opacity: 0;
      animation: cornerFade 1s ease 1.5s forwards;
    }
    .corner-deco.tl { top: 30px; left: 30px; border-top: 2px solid rgba(99,102,241,0.3); border-left: 2px solid rgba(99,102,241,0.3); }
    .corner-deco.tr { top: 30px; right: 30px; border-top: 2px solid rgba(99,102,241,0.3); border-right: 2px solid rgba(99,102,241,0.3); }
    .corner-deco.bl { bottom: 30px; left: 30px; border-bottom: 2px solid rgba(236,72,153,0.3); border-left: 2px solid rgba(236,72,153,0.3); }
    .corner-deco.br { bottom: 30px; right: 30px; border-bottom: 2px solid rgba(236,72,153,0.3); border-right: 2px solid rgba(236,72,153,0.3); }

    @keyframes cornerFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Version Tag ── */
    .version-tag {
      position: fixed;
      bottom: 20px;
      right: 30px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: #475569;
      letter-spacing: 2px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Exit Animation ── */
    .exit-animation .welcome-box {
      animation: cardExit 0.8s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .exit-animation .logo-ring {
      animation: logoExit 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .exit-animation .orb {
      animation: orbExit 0.8s ease forwards;
    }
    .exit-animation .corner-deco {
      animation: cornerFadeOut 0.5s ease forwards;
    }

    @keyframes cardExit {
      to { opacity: 0; transform: translateY(-30px) scale(0.9); filter: blur(8px); }
    }
    @keyframes logoExit {
      to { opacity: 0; transform: scale(0.3) rotate(90deg); }
    }
    @keyframes orbExit {
      to { opacity: 0; transform: scale(1.5); }
    }
    @keyframes cornerFadeOut {
      to { opacity: 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .welcome-box {
        padding: 35px 30px;
      }
      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<!-- Ambient Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Grid Background -->
<div class="grid-bg"></div>

<!-- Scan Line -->
<div class="scan-line"></div>

<!-- Floating Particles -->
<div class="particles" id="particles"></div>

<!-- Corner Decorations -->
<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<!-- Main Content -->
<div class="welcome-container">
  <!-- Animated Logo Ring -->
  <div class="logo-ring">
    <div class="ring-outer"></div>
    <div class="ring-inner"></div>
    <div class="ring-core">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
      </svg>
    </div>
  </div>

  <!-- Welcome Card -->
  <div class="welcome-box">
    <h1 class="title" id="animTitle">Welcome to SmartCampus</h1>
    <p class="subtitle">Welcome to SmartCampus</p>
    <div class="divider"></div>

    <div class="loading-section">
      <p class="loading-label">Initializing System</p>
      <div class="loading-track">
        <div class="loading-fill" id="loadingFill"></div>
      </div>
      <p class="loading-percent" id="loadingPercent">0%</p>
    </div>

    <div class="status-dots">
      <div class="status-dot"></div>
      <div class="status-dot"></div>
      <div class="status-dot"></div>
    </div>
  </div>
</div>

<!-- Version Tag -->
<div class="version-tag">SMARTCAMPUS v2.0</div>

<script>
  // ── Generate Floating Particles ──
  (function() {
    var container = document.getElementById('particles');
    for (var i = 0; i < 30; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = (Math.random() * 3 + 2) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (Math.random() * 6 + 6) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      container.appendChild(p);
    }
  })();

  // ── Animate Title Letters ──
  (function() {
    var title = document.getElementById('animTitle');
    var text = title.textContent;
    title.textContent = '';
    for (var i = 0; i < text.length; i++) {
      var span = document.createElement('span');
      span.className = 'char';
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      span.style.animationDelay = (1.2 + i * 0.04) + 's';
      title.appendChild(span);
    }
  })();

  // ── Animate Loading Percent Counter ──
  (function() {
    var percentEl = document.getElementById('loadingPercent');
    var start = null;
    var duration = 2500;
    var delay = 2800;

    setTimeout(function() {
      function step(timestamp) {
        if (!start) start = timestamp;
        var progress = Math.min((timestamp - start) / duration, 1);
        percentEl.textContent = Math.floor(progress * 100) + '%';
        if (progress < 1) {
          requestAnimationFrame(step);
        }
      }
      requestAnimationFrame(step);
    }, delay);
  })();

  // ── Redirect with exit animation ──
  setTimeout(function() {
    document.body.classList.add('exit-animation');
    setTimeout(function() {
      window.location.href = "login";
    }, 800);
  }, 5500);
</script>

</body>
</html>
