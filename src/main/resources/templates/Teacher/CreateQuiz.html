<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 24px;
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb.one { width: 340px; height: 340px; background: #6366f1; top: -80px; right: -80px; }
        .bg-orb.two { width: 300px; height: 300px; background: #ec4899; bottom: -100px; left: -60px; }
        .page {
            max-width: 920px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.35);
            padding: 26px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            color: #94a3b8;
            margin-top: 6px;
            font-size: 14px;
        }
        .back-btn {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 10px;
            padding: 10px 14px;
            background: rgba(139, 92, 246, 0.12);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field.full {
            grid-column: 1 / -1;
        }
        label {
            font-size: 12px;
            letter-spacing: 0.3px;
            color: #cbd5e1;
            font-weight: 500;
        }
        input, select, textarea {
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(2, 6, 23, 0.75);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 14px;
            padding: 12px 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        textarea { min-height: 96px; resize: vertical; }
        .actions {
            margin-top: 22px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 11px 18px;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #cbd5e1;
        }
        .section-title {
            margin-top: 24px;
            margin-bottom: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .error-text {
            color: #fda4af;
            font-size: 12px;
            margin-top: 6px;
        }
        @media (max-width: 768px) {
            body { padding: 14px; }
            .card { padding: 18px; }
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="bg-orb one"></div>
<div class="bg-orb two"></div>

<main class="page">
    <div class="card">
        <div class="header">
            <div>
                <h1 class="title">Create Quiz</h1>
                <p class="subtitle">Set up a new quiz for your class from the teacher dashboard.</p>
            </div>
            <a class="back-btn" th:href="@{/teacher-dashboard}">Back to Dashboard</a>
        </div>

        <form id="createQuizForm" th:action="@{/teacher-create-quiz}" method="post">
            <div class="grid">
                <div class="field">
                    <label for="course">Course</label>
                    <select id="course" name="course" required>
                        <option value="">Select Course</option>
                        <option value="CS301">CS301 - Data Structures</option>
                        <option value="CS402">CS402 - DBMS</option>
                        <option value="CS501">CS501 - Computer Networks</option>
                    </select>
                </div>
                <div class="field">
                    <label for="quizTitle">Quiz Title</label>
                    <input id="quizTitle" name="quizTitle" type="text" placeholder="Quiz 1 - Unit Test" required>
                </div>

                <div class="field">
                    <label for="totalMarks">Total Marks</label>
                    <input id="totalMarks" name="totalMarks" type="number" min="1" placeholder="20" required>
                </div>
                <div class="field">
                    <label for="duration">Duration (minutes)</label>
                    <input id="duration" name="duration" type="number" min="1" placeholder="30" required>
                </div>

                <div class="field">
                    <label for="startDate">Start Date</label>
                    <input id="startDate" name="startDate" type="date" required>
                </div>
                <div class="field">
                    <label for="startTime">Start Time</label>
                    <input id="startTime" name="startTime" type="time" required>
                </div>
                <div class="field">
                    <label for="endDate">End Date</label>
                    <input id="endDate" name="endDate" type="date" required>
                </div>
                <div class="field">
                    <label for="endTime">End Time</label>
                    <input id="endTime" name="endTime" type="time" required>
                </div>
                <div class="field full">
                    <p id="dateTimeError" class="error-text"></p>
                </div>

                <div class="field full">
                    <label for="instructions">Instructions</label>
                    <textarea id="instructions" name="instructions" placeholder="Add instructions for students..."></textarea>
                </div>
            </div>

            <div class="section-title">Question Setup</div>
            <div class="grid">
                <div class="field">
                    <label for="questionCount">Number of Questions</label>
                    <input id="questionCount" name="questionCount" type="number" min="1" placeholder="10" required>
                </div>
                <div class="field">
                    <label for="questionType">Question Type</label>
                    <select id="questionType" name="questionType" required>
                        <option value="">Select Type</option>
                        <option value="MCQ">MCQ</option>
                        <option value="DESCRIPTIVE">Descriptive</option>
                        <option value="MIXED">Mixed</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Create Quiz</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </div>
</main>
<script>
    const form = document.getElementById('createQuizForm');
    const startDateEl = document.getElementById('startDate');
    const startTimeEl = document.getElementById('startTime');
    const endDateEl = document.getElementById('endDate');
    const endTimeEl = document.getElementById('endTime');
    const dateTimeErrorEl = document.getElementById('dateTimeError');

    function getDateTimeValue(dateValue, timeValue) {
        return new Date(dateValue + 'T' + timeValue);
    }

    function validateDateTimeOrder() {
        if (!startDateEl.value || !startTimeEl.value || !endDateEl.value || !endTimeEl.value) {
            dateTimeErrorEl.textContent = '';
            return true;
        }

        const startDateTime = getDateTimeValue(startDateEl.value, startTimeEl.value);
        const endDateTime = getDateTimeValue(endDateEl.value, endTimeEl.value);

        if (startDateTime >= endDateTime) {
            dateTimeErrorEl.textContent = 'Start date/time must be earlier than end date/time.';
            return false;
        }

        dateTimeErrorEl.textContent = '';
        return true;
    }

    [startDateEl, startTimeEl, endDateEl, endTimeEl].forEach(function (el) {
        el.addEventListener('change', validateDateTimeOrder);
        el.addEventListener('input', validateDateTimeOrder);
    });

    form.addEventListener('submit', function (event) {
        if (!validateDateTimeOrder()) {
            event.preventDefault();
        }
    });
</script>
</body>
</html>
