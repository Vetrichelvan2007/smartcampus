<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Material</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 24px;
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb.one { width: 340px; height: 340px; background: #6366f1; top: -80px; right: -80px; }
        .bg-orb.two { width: 300px; height: 300px; background: #ec4899; bottom: -100px; left: -60px; }
        .page {
            max-width: 960px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.35);
            padding: 26px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            color: #94a3b8;
            margin-top: 6px;
            font-size: 14px;
        }
        .back-btn {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 10px;
            padding: 10px 14px;
            background: rgba(139, 92, 246, 0.12);
        }
        .section-title {
            margin: 22px 0 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field.full { grid-column: 1 / -1; }
        label {
            font-size: 12px;
            letter-spacing: 0.3px;
            color: #cbd5e1;
            font-weight: 500;
        }
        input, select, textarea {
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(2, 6, 23, 0.75);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 14px;
            padding: 12px 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        textarea { min-height: 92px; resize: vertical; }
        .file-note {
            font-size: 12px;
            color: #94a3b8;
        }
        .check-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        .check-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 8px 10px;
            border-radius: 9px;
            font-size: 13px;
            color: #e2e8f0;
        }
        .actions {
            margin-top: 22px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 11px 18px;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #cbd5e1;
        }
        @media (max-width: 768px) {
            body { padding: 14px; }
            .card { padding: 18px; }
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="bg-orb one"></div>
<div class="bg-orb two"></div>

<main class="page">
    <div class="card">
        <div class="header">
            <div>
                <h1 class="title">Upload Material</h1>
                <p class="subtitle">Upload lecture notes, slides, PDFs, and references for students.</p>
            </div>
            <a class="back-btn" th:href="@{/teacher-dashboard}">Back to Dashboard</a>
        </div>

        <form th:action="@{/teacher-upload-material}" method="post" enctype="multipart/form-data">
            <div class="section-title">Material Details</div>
            <div class="grid">
                <div class="field">
                    <label for="course">Course</label>
                    <select id="course" name="course" required>
                        <option value="">Select Course</option>
                        <option value="CS301">CS301 - Data Structures</option>
                        <option value="CS402">CS402 - DBMS</option>
                        <option value="CS501">CS501 - Computer Networks</option>
                    </select>
                </div>
                <div class="field">
                    <label for="materialTitle">Material Title</label>
                    <input id="materialTitle" name="materialTitle" type="text" placeholder="Unit 2 - Graph Algorithms" required>
                </div>
                <div class="field">
                    <label for="materialType">Material Type</label>
                    <select id="materialType" name="materialType" required>
                        <option value="">Select Type</option>
                        <option value="NOTES">Notes</option>
                        <option value="PPT">Presentation</option>
                        <option value="PDF">PDF</option>
                        <option value="ASSIGNMENT">Assignment Reference</option>
                        <option value="VIDEO_LINK">Video Link</option>
                    </select>
                </div>
                <div class="field">
                    <label for="section">Section</label>
                    <select id="section" name="section" required>
                        <option value="">Select Section</option>
                        <option value="A">Section A</option>
                        <option value="B">Section B</option>
                        <option value="ALL">All Sections</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="materialFile">Upload File</label>
                    <input id="materialFile" name="materialFile" type="file" required>
                    <p class="file-note">Allowed: PDF, PPT, PPTX, DOC, DOCX, ZIP. Max size based on server settings.</p>
                </div>
                <div class="field">
                    <label for="publishDate">Publish Date</label>
                    <input id="publishDate" name="publishDate" type="date" required>
                </div>
                <div class="field">
                    <label for="expiryDate">Expiry Date</label>
                    <input id="expiryDate" name="expiryDate" type="date">
                </div>
                <div class="field full">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Brief details about the material..."></textarea>
                </div>
            </div>

            <div class="section-title">Access Settings</div>
            <div class="grid">
                <div class="field full">
                    <label>Student Access</label>
                    <div class="check-row">
                        <label class="check-item"><input type="checkbox" name="access" value="VIEW_ONLY"> View Only</label>
                        <label class="check-item"><input type="checkbox" name="access" value="DOWNLOAD" checked> Download Allowed</label>
                        <label class="check-item"><input type="checkbox" name="access" value="NOTIFY"> Send Notification</label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Upload Material</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
