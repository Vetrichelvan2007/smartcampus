<!DOCTYPE html>
<html lang="en" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Submission</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.5);
            --grad: linear-gradient(135deg, var(--primary), var(--accent));
            --bg-main: #060918;
            --bg-side: rgba(15, 23, 42, 0.8);
            --bg-card: rgba(30, 41, 59, 0.5);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --sidebar-width: 260px;
            --topbar-height: 80px;
            --radius: 24px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-side: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.08);
            --glass-border: rgba(99, 102, 241, 0.2);
            --text-main: #0f172a;
            --text-dim: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .orbs { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 20s infinite alternate ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--primary); top: 40%; right: 10%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.1); } }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-side);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            display: flex; flex-direction: column;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-brand { padding: 32px 24px; display: flex; align-items: center; gap: 14px; }
        .sidebar-brand-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: var(--grad);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .sidebar-brand-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
        .sidebar-nav-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 20px 12px 8px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px;
            color: var(--text-dim); text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 4px;
        }
        .nav-item:hover { background: rgba(99, 102, 241, 0.08); color: var(--primary); transform: translateX(8px); }
        .nav-item.active { background: var(--grad); color: white; box-shadow: 0 4px 15px var(--primary-glow); }
        .nav-item.active svg { stroke: #fff; }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
        .nav-item--logout { color: #ef4444; }
        .nav-item--logout:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }

        .content-wrapper { margin-left: var(--sidebar-width); flex: 1; min-width: 0; }

        .topbar {
            height: var(--topbar-height);
            background: transparent;
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; position: sticky; top: 0; z-index: 90;
        }
        .topbar-left, .topbar-actions { display: flex; align-items: center; gap: 12px; }
        .search-box {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 18px;
            width: 350px;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            width: 380px;
        }
        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text-main); font-size: 14px; width: 100%;
        }
        .topbar-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .topbar-btn:hover {
            color: var(--primary);
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        .topbar-btn .badge {
            position: absolute; top: 10px; right: 10px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .theme-toggle-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; }

        .page-content { padding: 40px; max-width: 1400px; margin: 0 auto; }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            padding: 32px;
        }

        .page-header { margin-bottom: 32px; }
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .section-title {
            font-family: 'Orbitron'; 
            font-size: 12px; 
            font-weight: 700;
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 32px 0 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .answers-container { border: 1px solid var(--border); background: transparent; border-radius: 12px; overflow: hidden; }
        .answer-item { padding: 24px; border-bottom: 1px solid var(--border); }
        .answer-item:last-child { border-bottom: none; }
        .answer-item:hover { background: rgba(99, 102, 241, 0.02); }
        
        .question-text { font-weight: 600; color: var(--text-main); font-size: 15px; margin-bottom: 8px; }
        .answer-meta { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; display: flex; gap: 16px; }
        .answer-content { 
            background: rgba(2, 6, 23, 0.5);
            padding: 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
        }
        .answer-content > div { margin-bottom: 8px; }
        .answer-content > div:last-child { margin-bottom: 0; }

        .btn-grad {
            background: var(--grad);
            color: white; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin: 24px 0; }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; z-index: 99; backdrop-filter: blur(4px);
        }
        .sidebar-overlay.active { display: block; }
        .hamburger { display: none; background: none; border: none; color: var(--text-main); cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .content-wrapper { margin-left: 0; }
            .hamburger { display: block; }
            .search-box { display: none; }
            .topbar { padding: 0 16px; }
            .page-content { padding: 20px; }
            .page-title { font-size: 24px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/teacher-theme.css}" href="/css/teacher-theme.css">
</head>
<body>

<div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">EP</div>
        <div>
            <div class="sidebar-brand-text">SmartCampus</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Main</div>
        <a class="nav-item" href="/teacher-dashboard">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            Dashboard
        </a>
        <a class="nav-item" th:href="@{/teacher-mysubjects}">
            <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            My Subjects
        </a>
        <a class="nav-item" href="#">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Attendance
        </a>
        <a class="nav-item" th:href="@{/teacher-view-student}">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            View Student
        </a>

        <div class="sidebar-nav-label">Academics</div>
        <a class="nav-item" href="#">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Internal Marks
        </a>
        <a class="nav-item active" th:href="@{/teacher-create-quiz}">
            <svg viewBox="0 0 24 24"><path d="M12 4v16"/><path d="M4 12h16"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Create Quiz
        </a>
        <a class="nav-item" th:href="@{/teacher-assign-feedback}">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Assign Feedback
        </a>
        <a class="nav-item" th:href="@{/teacher-upload-material}">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/></svg>
            Materials
        </a>

        <div class="sidebar-nav-label">Personal</div>
        <a class="nav-item" href="/profile">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
        </a>
    </nav>

    <div class="sidebar-footer">
        <a class="nav-item nav-item--logout" href="/logout">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </a>
    </div>
</aside>

<div class="content-wrapper">
    <header class="topbar">
        <div class="topbar-left">
            <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search submissions...">
            </div>
        </div>
        <div class="topbar-actions">
            <button class="topbar-btn theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <svg class="sun-icon" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="topbar-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="badge"></span>
            </div>
            <div style="width: 44px; height: 44px; border-radius: 12px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-family: 'Orbitron'; cursor: pointer;">DR</div>
        </div>
    </header>

    <main class="page-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${quizTitle}">Quiz Submission</h1>
            <p class="page-subtitle">
                <span th:text="${courseName}"></span>
                <span th:if="${courseCode != null}" th:text="| (${courseCode})|"></span>
                <span th:text="| Student: ${studentName} (${rollNumber})|"></span>
            </p>
            <p class="page-subtitle" th:if="${submittedAt != null}">
                <span th:text="${'Submitted: ' + #dates.format(submittedAt, 'dd-MMM-yyyy HH:mm')}"></span>
                <span th:if="${score != null}" th:text="${' Ãƒâ€šÃ‚Â· Score: ' + score}"></span>
            </p>
        </div>

        <div class="glass-card">
            <div class="action-buttons">
                <a class="btn-grad" th:href="@{/teacher-quiz/{id}(id=${quizId})}">Back to Quiz</a>
                <a class="btn-secondary" th:href="@{/teacher-dashboard}">Dashboard</a>
            </div>

            <div class="section-title">Student Responses</div>
            <div class="answers-container">
                <div class="answer-item" th:each="r : ${answers}">
                    <div class="question-text" th:text="${r.get('order') + '. ' + r.get('text')}"></div>
                    <div class="answer-meta">
                        <span th:text="${r.get('type')}"></span>
                        <span th:text="${r.get('marks') + ' marks'}"></span>
                    </div>
                    <div class="answer-content">
                        <div th:if="${r.get('type') != null and r.get('type').toString().equalsIgnoreCase('MCQ')}">
                            <div th:text="${'Selected: ' + (r.get('selected') != null ? r.get('selected') : 'Not answered') }"></div>
                            <div th:text="${'Correct: ' + (r.get('correct') != null ? r.get('correct') : '-') }"></div>
                            <div th:text="${'Points Awarded: ' + (r.get('awarded') != null ? r.get('awarded') : '-') }"></div>
                        </div>
                        <div th:if="${r.get('type') == null or r.get('type').toString().equalsIgnoreCase('DESCRIPTIVE')}">
                            <div th:text="${r.get('answerText') != null ? r.get('answerText') : 'No answer provided'}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // Theme Toggle
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcons();
    }

    function updateThemeIcons() {
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'light') {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        } else {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }
    }

    // Sidebar Toggle
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }

    // Initialize theme on page load
    window.addEventListener('DOMContentLoaded', function () {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons();
    });
</script>
</body>
</html>
