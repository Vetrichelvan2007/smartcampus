<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 24px;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        .orb.one { width: 360px; height: 360px; background: #6366f1; top: -90px; right: -90px; }
        .orb.two { width: 300px; height: 300px; background: #ec4899; bottom: -90px; left: -60px; }
        .page {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.35);
            padding: 24px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .btn-back {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 10px;
            padding: 9px 14px;
            background: rgba(139, 92, 246, 0.12);
            white-space: nowrap;
        }
        .filters {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
            margin-bottom: 20px;
        }
        input, select {
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(2, 6, 23, 0.75);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 14px;
            padding: 11px 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            width: 100%;
        }
        input:focus, select:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.07);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 820px;
        }
        thead th {
            text-align: left;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            color: #64748b;
            text-transform: uppercase;
            padding: 13px 14px;
            background: rgba(2, 6, 23, 0.7);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        tbody td {
            padding: 13px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
            font-size: 13px;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        .badge {
            display: inline-block;
            padding: 4px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-active {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.35);
        }
        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.35);
        }
        .btn-view {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
        }
        .profile-card {
            margin-top: 22px;
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 16px;
            align-items: center;
            padding: 16px;
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #ec4899);
        }
        .profile-name {
            font-size: 18px;
            font-weight: 600;
        }
        .profile-meta {
            margin-top: 4px;
            font-size: 13px;
            color: #94a3b8;
        }
        @media (max-width: 900px) {
            .filters { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            body { padding: 14px; }
            .card { padding: 16px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .profile-card { grid-template-columns: 1fr; text-align: center; }
            .avatar { margin: 0 auto; }
        }
    </style>
</head>
<body>
<div class="orb one"></div>
<div class="orb two"></div>

<main class="page">
    <section class="card">
        <div class="topbar">
            <div>
                <h1 class="title">View Student</h1>
                <p class="subtitle">Search and review student details, attendance and academic status.</p>
            </div>
            <a class="btn-back" th:href="@{/teacher-dashboard}">Back to Dashboard</a>
        </div>

        <div class="filters">
            <input type="text" placeholder="Search by name, register number, or email">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Register No</th>
                    <th>Department</th>
                    <th>Semester</th>
                    <th>Attendance</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${students == null or #lists.isEmpty(students)}">
                    <td colspan="7">No students found for this course.</td>
                </tr>
                <tr th:each="student : ${students}">
                    <td th:text="${student.studentName}"></td>
                    <td th:text="${student.studentRegisterNumber}"></td>
                    <td th:text="${student.department}"></td>
                    <td th:text="${student.semester}"></td>
                    <td>-</td>
                    <td>
                        <span class="badge"
                              th:classappend="${student.status != null and student.status.equalsIgnoreCase('ACTIVE')} ? ' badge-active' : ' badge-warning'"
                              th:text="${student.status}"></span>
                    </td>
                    <td><a href="#" class="btn-view">View</a></td>
                </tr>
                </tbody>
            </table>
        </div>

    </section>
</main>
</body>
</html>
