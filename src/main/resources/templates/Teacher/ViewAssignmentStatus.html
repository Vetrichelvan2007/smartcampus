<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #0a0e27; color: #f1f5f9; min-height: 100vh; padding: 24px; }
        .page { max-width: 1120px; margin: 0 auto; }
        .card { background: rgba(15, 23, 42, 0.82); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); backdrop-filter: blur(18px); }
        .header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
        .title { font-family: 'Orbitron', sans-serif; font-size: 26px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-top: 8px; }
        .back-btn { color: #c4b5fd; text-decoration: none; font-size: 13px; border: 1px solid rgba(139, 92, 246, 0.35); border-radius: 10px; padding: 10px 14px; background: rgba(139, 92, 246, 0.12); }
        .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 22px; }
        .stat { background: rgba(2, 6, 23, 0.55); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }
        .stat-label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { margin-top: 8px; font-size: 28px; font-weight: 700; }
        .section-title { margin: 22px 0 12px; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 1px; color: #94a3b8; text-transform: uppercase; }
        .question-box { background: rgba(2, 6, 23, 0.55); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; color: #e2e8f0; line-height: 1.7; white-space: pre-wrap; }
        .table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }
        table { width: 100%; border-collapse: collapse; min-width: 920px; }
        thead th { text-align: left; padding: 12px 14px; color: #94a3b8; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        tbody td { padding: 12px 14px; color: #e2e8f0; border-top: 1px solid rgba(255,255,255,0.06); font-size: 13px; vertical-align: top; }
        .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .pill.ok { background: rgba(34,197,94,0.16); color: #86efac; }
        .pill.no { background: rgba(239,68,68,0.14); color: #fca5a5; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 8px 12px; border-radius: 9px; text-decoration: none; font-size: 12px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899); color: #fff; }
        .btn-secondary { background: rgba(148, 163, 184, 0.12); border: 1px solid rgba(148, 163, 184, 0.2); color: #cbd5e1; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        @media (max-width: 768px) {
            body { padding: 14px; }
            .stats { grid-template-columns: 1fr; }
            .header { flex-direction: column; }
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/teacher-theme.css}" href="/css/teacher-theme.css">
</head>
<body>
<main class="page">
    <div class="card">
        <div class="header">
            <div>
                <h1 class="title" th:text="${assignment.title}">Assignment Status</h1>
                <p class="subtitle">
                    <span th:text="${courseCode}">CSE-EE102</span>
                    <span> | </span>
                    <span th:text="${courseName}">Course</span>
                    <span> | Due: </span>
                    <span th:text="${assignment.dueAtText}">-</span>
                </p>
            </div>
            <a class="back-btn" th:href="@{/teacher-upload-assignment(courseId=${courseId})}">Back</a>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Total Students</div>
                <div class="stat-value" th:text="${#lists.size(students)}">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Submitted</div>
                <div class="stat-value" th:text="${submittedCount}">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Pending</div>
                <div class="stat-value" th:text="${pendingCount}">0</div>
            </div>
        </div>

        <div class="section-title">Question</div>
        <div class="question-box">
            <div th:if="${assignment.assignmentMode == 'TEXT'}" th:text="${assignment.questionText}">Direct question</div>
            <div th:if="${assignment.assignmentMode == 'FILE'}">
                <div th:text="${assignment.originalFileName}">Question file</div>
                <div style="margin-top: 10px;">
                    <a class="btn btn-secondary" th:href="@{/teacher/assignment/{id}/download(id=${assignment.id})}">Download Question File</a>
                </div>
            </div>
        </div>

        <div class="section-title">Student Submission Status</div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Student</th>
                    <th>Roll No</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Submitted At</th>
                    <th>File</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.studentName}"></td>
                    <td th:text="${s.studentRegisterNumber}"></td>
                    <td th:text="${s.studentEmail}"></td>
                    <td>
                        <span th:if="${s.submitted}" class="pill ok">Submitted</span>
                        <span th:if="${!s.submitted}" class="pill no">Not Submitted</span>
                    </td>
                    <td th:text="${s.submitted ? s.submittedAtText : '-'}"></td>
                    <td th:text="${s.submitted ? s.submissionOriginalFileName : '-'}"></td>
                    <td>
                        <div th:if="${s.submitted}" class="btn-row">
                            <a class="btn btn-secondary" th:href="@{/teacher/assignment-submission/{id}/view(id=${s.submissionId})}" target="_blank">View</a>
                            <a class="btn btn-primary" th:href="@{/teacher/assignment-submission/{id}/download(id=${s.submissionId})}">Download</a>
                        </div>
                        <span th:if="${!s.submitted}" style="color:#94a3b8;">No file</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
