<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classroom Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-base: #0a0e27;
            --card-surface: rgba(15, 23, 42, 0.7);
            --card-border: rgba(255,255,255,0.10);
            --card-sheen: inset 0 1px 0 rgba(255,255,255,0.10);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
            --right-inset: rgba(10, 14, 27, 0.5);
            --input-bg: rgba(15, 23, 42, 0.8);
            --accent-1: #6366f1;
            --accent-2: #8b5cf6;
            --accent-3: #ec4899;
            --accent-4: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== AMBIENT ORBS ===== */
        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -150px;
            right: -100px;
            animation: floatOrb1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #ec4899;
            bottom: -120px;
            left: -80px;
            animation: floatOrb2 15s ease-in-out infinite;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #06b6d4;
            top: 40%;
            right: 10%;
            animation: floatOrb3 10s ease-in-out infinite;
        }

        @keyframes floatOrb1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 40px) scale(1.05); }
        }

        @keyframes floatOrb2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -30px) scale(0.95); }
        }

        @keyframes floatOrb3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(1.08); }
        }

        /* ===== CONTENT ABOVE ORBS ===== */
        .topbar, .container {
            position: relative;
            z-index: 1;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 14, 39, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            box-shadow: var(--card-sheen), 0 1px 0 rgba(0,0,0,0.4);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-brand .icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .topbar-brand h1 {
            font-family: 'Orbitron', monospace;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-wrapper {
            position: relative;
            width: 38%;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .topbar input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            box-shadow: var(--card-sheen);
        }

        .topbar input::placeholder {
            color: var(--text-muted);
        }

        .topbar input:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2), var(--card-sheen);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        /* ===== LAYOUT ===== */
        .container {
            padding: 40px 40px 60px;
        }

        .layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 230px;
            flex-shrink: 0;
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 24px 18px;
            box-shadow: var(--card-shadow), var(--card-sheen);
            position: sticky;
            top: 20px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-header h3 {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* ===== SEM BUTTON ===== */
        .sem-btn {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 6px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            text-align: left;
            font-family: 'Poppins', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.22s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sem-btn .sem-num {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .sem-btn:hover {
            background: rgba(99,102,241,0.1);
            color: #c7d2fe;
            border-color: rgba(99,102,241,0.2);
            transform: translateX(3px);
        }

        .sem-btn:hover .sem-num {
            background: rgba(99,102,241,0.2);
            color: #a5b4fc;
        }

        .sem-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.35);
        }

        .sem-btn.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.12));
            color: #c7d2fe;
            border-color: rgba(99,102,241,0.3);
            font-weight: 600;
        }

        .sem-btn.active .sem-num {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            min-width: 0;
        }

        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .content-title {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .course-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--right-inset);
            border: 1px solid var(--card-border);
            padding: 4px 12px;
            border-radius: 999px;
        }

        /* ===== COURSE GRID ===== */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            align-items: stretch;
        }

        /* ===== COURSE LINK ===== */
        .course-link {
            text-decoration: none;
            color: inherit;
        }

        /* ===== CARD ===== */
        .course-card {
            position: relative;
            padding: 28px 26px 24px;
            border-radius: 20px;
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow), var(--card-sheen);

            min-height: 160px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;

            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* card corner accent */
        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        /* card glow overlay on hover */
        .course-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .course-link:hover .course-card::after {
            opacity: 1;
        }

        /* type-specific hover glows */
        .course-link:has(.badge.lot):hover .course-card::after {
            background: radial-gradient(ellipse at 80% 0%, rgba(34,197,94,0.07) 0%, transparent 65%);
        }
        .course-link:has(.badge.theory):hover .course-card::after {
            background: radial-gradient(ellipse at 80% 0%, rgba(99,102,241,0.1) 0%, transparent 65%);
        }

        .course-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .course-link:hover .course-card {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), var(--card-sheen);
            border-color: rgba(255,255,255,0.16);
        }

        .course-link:active .course-card {
            transform: scale(0.97);
        }

        .course-link:focus-visible .course-card {
            box-shadow: 0 0 0 3px rgba(99,102,241,0.4), var(--card-shadow);
        }

        /* ===== CARD META ===== */
        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .course-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.2px;
            line-height: 1.4;
        }

        .code {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1px;
            background: var(--right-inset);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: auto;
        }

        /* ===== BADGE ===== */
        .badge {
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
            transition: transform 0.2s ease;
            white-space: nowrap;
        }

        .course-link:hover .badge {
            transform: scale(1.05);
        }

        .lot {
            background: rgba(34,197,94,0.12);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.2);
        }

        .theory {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.25);
        }

        /* ===== STAGGER ANIMATION ===== */
        .course-card:nth-child(1) { transition-delay: 0.05s; }
        .course-card:nth-child(2) { transition-delay: 0.10s; }
        .course-card:nth-child(3) { transition-delay: 0.15s; }
        .course-card:nth-child(4) { transition-delay: 0.20s; }
        .course-card:nth-child(5) { transition-delay: 0.25s; }
        .course-card:nth-child(6) { transition-delay: 0.30s; }

        /* ===== STAT DEBUG ===== */
        .debug-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--right-inset);
            border: 1px solid var(--card-border);
            padding: 5px 13px;
            border-radius: 999px;
            margin-bottom: 24px;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
    </style>
</head>

<body>

<!-- AMBIENT ORBS -->
<div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<!-- TOP BAR -->
<header class="topbar">
    <div class="topbar-brand">
        <div class="icon">🎓</div>
        <h1>COLLEGE PORTAL</h1>
    </div>

    <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search courses..." />
    </div>

    <div class="topbar-right">
        <div class="avatar">S</div>
    </div>
</header>

<main class="container">
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Semester</h3>
            </div>

            <button
                    th:each="sem : ${#numbers.sequence(1, current_sem)}"
                    th:data-sem="${sem}"
                    class="sem-btn"
                    th:classappend="${sem == current_sem} ? ' active' : ''">
                <span class="sem-num" th:text="${sem}"></span>
                <span th:text="'Semester ' + ${sem}"></span>
            </button>

        </aside>

        <!-- COURSES -->
        <section class="content">

            <div class="content-header">
                <span class="content-title">Courses</span>
                <span class="course-count" th:text="${#lists.size(courseDatas)} + ' courses'"></span>
            </div>

            <p th:text="'Courses loaded: ' + ${#lists.size(courseDatas)}"></p>

            <div class="course-grid">

                <a th:each="c : ${courseDatas}"
                   th:href="@{/course/{code}(code=${c.courseCode})}"
                   class="course-link">

                    <div class="course-card" th:data-sem="${c.courseSem}">

                        <div class="card-meta">
                            <span class="badge"
                                  th:text="${c.courseType}"
                                  th:classappend="' ' + ${#strings.toLowerCase(c.courseType)}">
                            </span>
                        </div>

                        <h3 th:text="${c.courseName}"></h3>
                        <div class="code" th:text="${c.courseCode}"></div>

                    </div>

                </a>

            </div>
        </section>

    </div>
</main>

<!-- ===== JS ===== -->
<script th:inline="javascript">

    const currentSem = [[${current_sem}]];

    const courseLinks = document.querySelectorAll(".course-link");
    const buttons = document.querySelectorAll(".sem-btn");

    filterCourses(currentSem);
    setActiveButton(currentSem);

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            const sem = Number(btn.dataset.sem);
            filterCourses(sem);
            setActiveButton(sem);
        });
    });

    const searchInput = document.querySelector('.topbar input');
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase();
            const activeSem = Number(document.querySelector('.sem-btn.active')?.dataset.sem || currentSem);

            courseLinks.forEach(link => {
                const card = link.querySelector('.course-card');
                const cardSem = Number(card.dataset.sem);
                const name = card.querySelector('h3')?.textContent.toLowerCase() || '';
                const code = card.querySelector('.code')?.textContent.toLowerCase() || '';
                const match = name.includes(q) || code.includes(q);

                if (cardSem === activeSem && match) {
                    link.style.display = 'block';
                    requestAnimationFrame(() => card.classList.add('show'));
                } else {
                    link.style.display = 'none';
                    card.classList.remove('show');
                }
            });
        });
    }

    function filterCourses(sem) {
        courseLinks.forEach((link, i) => {
            const card = link.querySelector(".course-card");
            const cardSem = Number(card.dataset.sem);

            if (cardSem === sem) {
                link.style.display = "block";
                setTimeout(() => {
                    card.classList.add("show");
                }, i * 40);
            } else {
                link.style.display = "none";
                card.classList.remove("show");
            }
        });
    }

    function setActiveButton(sem) {
        buttons.forEach(btn => {
            btn.classList.toggle("active", Number(btn.dataset.sem) === sem);
        });
    }

</script>

</body>
</html>
