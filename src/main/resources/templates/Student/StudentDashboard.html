<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Portal Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>

        /* ── Demo scaffold only ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #0a0e27; font-family: 'Poppins', sans-serif; }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(circle at 20% 50%, rgba(99,102,241,0.12) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(236,72,153,0.12) 0%, transparent 50%),
                    radial-gradient(circle at 40% 0%,  rgba(6,182,212,0.08)  0%, transparent 50%);
            pointer-events: none;
        }

        .demo-wrap {
            display: flex;
            gap: 24px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* ════════════════════════════════════════════════
           DESIGN TOKENS
        ════════════════════════════════════════════════ */
        :root {
            --base:          #0a0e27;
            --card-surface:  rgba(15, 23, 42, 0.70);
            --card-inset:    rgba(10, 14, 27, 0.60);

            --accent-start:  #6366f1;
            --accent-mid:    #8b5cf6;
            --accent-end:    #ec4899;
            --accent-cyan:   #06b6d4;
            --accent-grad:   linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);

            --border-mid:    rgba(255,255,255,0.10);
            --accent-border: rgba(99,102,241,0.30);

            --text-primary:  #f1f5f9;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;

            --shadow-card:
                    0 8px 32px rgba(0,0,0,0.30),
                    0 0 0 1px rgba(255,255,255,0.05),
                    inset 0 1px 0 rgba(255,255,255,0.08);

            --r-sm: 10px;
            --r-xl: 24px;

            /* Neon glow palette */
            --glow-indigo:   rgba(99,102,241,0.55);
            --glow-violet:   rgba(139,92,246,0.45);
            --glow-pink:     rgba(236,72,153,0.40);
            --glow-cyan:     rgba(6,182,212,0.35);
        }

        /* ════════════════════════════════════════════════
           KEYFRAMES
        ════════════════════════════════════════════════ */

        /* 1. Rotating conic gradient for animated border */
        @keyframes borderSpin {
            0%   { --angle: 0deg; }
            100% { --angle: 360deg; }
        }

        /* 2. Shimmer sweep across text / background */
        @keyframes shimmerSweep {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }

        /* 3. Radial glow pulse on active item */
        @keyframes glowPulse {
            0%, 100% { box-shadow:
                    inset 0 0 0px rgba(99,102,241,0),
                    0 0 12px rgba(99,102,241,0.20),
                    0 0 0 1px rgba(99,102,241,0.25); }
            50%       { box-shadow:
                    inset 0 0 14px rgba(99,102,241,0.10),
                    0 0 28px rgba(99,102,241,0.38),
                    0 0 0 1px rgba(139,92,246,0.45); }
        }

        /* 4. Left-bar pulse for active marker */
        @keyframes barPulse {
            0%, 100% { opacity: 1;  height: 65%; top: 17.5%; }
            50%       { opacity: 0.7; height: 75%; top: 12.5%; }
        }

        /* 5. Subtle sidebar container halo */
        @keyframes containerHalo {
            0%, 100% { box-shadow:
                    var(--shadow-card),
                    0 0 0px rgba(99,102,241,0); }
            50%       { box-shadow:
                    var(--shadow-card),
                    0 0 40px rgba(99,102,241,0.12),
                    0 0 80px rgba(139,92,246,0.06); }
        }

        /* 6. Neon text flicker for active label */
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow:
                        0 0 4px rgba(165,180,252,0.9),
                        0 0 10px rgba(99,102,241,0.6),
                        0 0 20px rgba(99,102,241,0.3);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        /* 7. Hover radial expand */
        @keyframes radialExpand {
            0%   { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* ════════════════════════════════════════════════
           @property for smooth angle interpolation
           (supported Chrome/Edge; graceful degradation elsewhere)
        ════════════════════════════════════════════════ */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        /* ════════════════════════════════════════════════
           SIDEBAR CONTAINER
        ════════════════════════════════════════════════ */
        .sidebar {
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            padding: 10px;
            height: fit-content;
            position: sticky;
            top: 82px;
            width: 240px;

            /* Animated border via conic-gradient pseudo-element */
            border: none;
            box-shadow: var(--shadow-card);
            animation: containerHalo 6s ease-in-out infinite;

            /* Isolate stacking context */
            isolation: isolate;
        }

        /* ── Rotating gradient border ring ── */
        .sidebar::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: calc(var(--r-xl) + 2px);
            background: conic-gradient(
                    from var(--angle),
                    transparent 0%,
                    rgba(99,102,241,0.80) 15%,
                    rgba(139,92,246,0.90) 30%,
                    rgba(236,72,153,0.80) 45%,
                    rgba(6,182,212,0.70)  60%,
                    transparent 75%
            );
            animation: borderSpin 6s linear infinite;
            z-index: -1;
            opacity: 0.55;
            transition: opacity 0.4s ease;
        }

        /* ── Inner fill so gradient ring only shows at edge ── */
        .sidebar::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: calc(var(--r-xl) - 1px);
            background: rgba(10, 14, 27, 0.92);
            backdrop-filter: blur(20px);
            z-index: -1;
        }

        .sidebar:hover::before { opacity: 0.85; }

        /* ════════════════════════════════════════════════
           SIDEBAR LINKS — BASE
        ════════════════════════════════════════════════ */
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 9px 13px;
            border-radius: var(--r-sm);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            transition:
                    color       0.30s ease,
                    background  0.30s ease,
                    transform   0.30s ease,
                    border-color 0.30s ease,
                    box-shadow   0.30s ease;
        }

        /* ── Shimmer sweep layer (hidden by default) ── */
        .sidebar a::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                    110deg,
                    transparent 20%,
                    rgba(255,255,255,0.06) 40%,
                    rgba(165,180,252,0.10) 50%,
                    rgba(255,255,255,0.06) 60%,
                    transparent 80%
            );
            background-size: 200% 100%;
            background-position: -200% center;
            border-radius: var(--r-sm);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* ── Radial click/hover ripple ── */
        .sidebar a .ripple {
            position: absolute;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.45), transparent);
            transform: scale(0);
            pointer-events: none;
            animation: radialExpand 0.6s ease-out forwards;
        }

        /* ════════════════════════════════════════════════
           HOVER STATE — cyber energy, not gaming
        ════════════════════════════════════════════════ */
        .sidebar a:hover {
            color: var(--text-primary);
            background: rgba(99,102,241,0.07);
            border-color: rgba(99,102,241,0.18);
            transform: translateX(3px);
            box-shadow:
                    inset 0 0 12px rgba(99,102,241,0.05),
                    0 2px 12px rgba(99,102,241,0.12);
            /* Neon text glow — soft, professional */
            text-shadow:
                    0 0 8px  rgba(165,180,252,0.50),
                    0 0 16px rgba(99,102,241,0.25);
        }

        /* Trigger shimmer on hover */
        .sidebar a:hover::after {
            opacity: 1;
            animation: shimmerSweep 0.7s ease forwards;
        }

        /* Hover left accent line — gradient, thin */
        .sidebar a:hover::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; height: 60%; width: 2px;
            background: linear-gradient(180deg, var(--accent-start), var(--accent-mid));
            border-radius: 0 2px 2px 0;
            opacity: 0.7;
        }

        /* ════════════════════════════════════════════════
           ACTIVE STATE — full cyber-neon energy
        ════════════════════════════════════════════════ */
        .sidebar a.active {
            background: rgba(10, 14, 27, 0.70);
            color: #a5b4fc;
            font-weight: 500;
            border-color: transparent;
            transform: translateX(0);

            /* Glow pulse animation */
            animation: glowPulse 3s ease-in-out infinite;

            /* Neon text shimmer — restrained */
            text-shadow:
                    0 0 6px  rgba(165,180,252,0.80),
                    0 0 14px rgba(99,102,241,0.50),
                    0 0 28px rgba(99,102,241,0.20);
        }

        /* Active shimmer — always running */
        .sidebar a.active::after {
            opacity: 1;
            background: linear-gradient(
                    110deg,
                    transparent 15%,
                    rgba(165,180,252,0.06) 35%,
                    rgba(139,92,246,0.10) 50%,
                    rgba(165,180,252,0.06) 65%,
                    transparent 85%
            );
            background-size: 200% 100%;
            animation: shimmerSweep 2.5s ease-in-out infinite;
        }

        /* Active left bar — animated gradient + pulse */
        .sidebar a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 17.5%;
            height: 65%;
            width: 3px;
            background: linear-gradient(180deg,
            var(--accent-start) 0%,
            var(--accent-mid)   50%,
            var(--accent-end)  100%
            );
            border-radius: 0 3px 3px 0;
            animation: barPulse 2.5s ease-in-out infinite;
            /* Bar glow — matches the gradient */
            box-shadow:
                    0 0 6px  rgba(99,102,241,0.80),
                    0 0 12px rgba(139,92,246,0.50),
                    0 0 20px rgba(236,72,153,0.25);
        }

        /* Active: suppress hover translation so active stays locked */
        .sidebar a.active:hover {
            transform: translateX(1px);
        }

        /* ════════════════════════════════════════════════
           LABEL — neon flicker on active (once, on load)
        ════════════════════════════════════════════════ */
        .sidebar a.active span {
            animation: neonFlicker 4s ease-in-out 0.5s 1 forwards;
        }

        /* ════════════════════════════════════════════════
           DEMO PREVIEW ONLY (not part of deliverable CSS)
        ════════════════════════════════════════════════ */
        .preview-label {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 8px 13px 4px;
            display: block;
        }

    </style>
    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS — extracted 1:1 from login page
        ═══════════════════════════════════════════ */
        :root {
            /* Exact login page base */
            --base:          #0a0e27;

            /* Card surfaces — match login .card and .right-section */
            --card-surface:  rgba(15, 23, 42, 0.70);   /* login .card */
            --card-inset:    rgba(10, 14, 27, 0.60);   /* login .right-section */
            --card-deep:     rgba(15, 23, 42, 0.85);   /* inputs — darkest level */

            /* Borders — exact login values */
            --border:        rgba(255, 255, 255, 0.08);
            --border-mid:    rgba(255, 255, 255, 0.10);
            --border-focus:  rgba(99, 102, 241, 0.40);

            /* Shadow — login card shadow, no glow */
            --shadow-card:   0 8px 32px rgba(0, 0, 0, 0.30),
            0 0 0 1px rgba(255, 255, 255, 0.05),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
            --shadow-lift:   0 16px 48px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 255, 255, 0.05),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
            --shadow-subtle: 0 4px 16px rgba(0, 0, 0, 0.25);

            /* Accent — login: interactive elements only */
            --accent-grad:   linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            --accent-start:  #6366f1;
            --accent-mid:    #8b5cf6;
            --accent-end:    #ec4899;
            --accent-soft:   rgba(99, 102, 241, 0.10);
            --accent-border: rgba(99, 102, 241, 0.25);

            /* Orb colors — match login animated-bg exactly */
            --orb-1:         #6366f1;   /* top-right */
            --orb-2:         #ec4899;   /* bottom-left */
            --orb-3:         #06b6d4;   /* mid-right */

            /* Typography — login page fonts */
            --font-body:     'Poppins', sans-serif;
            --font-display:  'Orbitron', sans-serif;

            /* Text — exact login values */
            --text-primary:  #f1f5f9;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;
            --text-dim:      #475569;

            /* Radii */
            --r-sm:  10px;
            --r-md:  14px;
            --r-lg:  18px;
            --r-xl:  24px;
        }

        /* ═══════════════════════════════════════════
           RESET
        ═══════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body { height: 100%; }

        body {
            font-family: var(--font-body);
            /* Exact login base color */
            background: var(--base);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ── Radial overlays — copied from login body::before ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 40% 0%,  rgba(6, 182, 212, 0.08)  0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Orbs — same as login .orb system ── */
        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25; /* slightly reduced vs login — bg not competing with content */
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--orb-1), transparent);
            top: -150px; right: -100px;
            animation: float1 15s ease-in-out infinite;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, var(--orb-2), transparent);
            bottom: -80px; left: -60px;
            animation: float2 20s ease-in-out infinite;
        }

        .orb-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--orb-3), transparent);
            top: 50%; right: 5%;
            animation: float3 18s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(30px, -40px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-50px, 50px); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-30px, 30px); }
        }

        /* ═══════════════════════════════════════════
           KEYFRAMES
        ═══════════════════════════════════════════ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Staggered load — matches login containerFadeIn timing */
        .topbar              { animation: fadeIn  0.6s ease-out both; }
        .sidebar             { animation: fadeUp  0.6s ease-out 0.10s both; }
        .feed > *:nth-child(1){ animation: fadeUp 0.6s ease-out 0.15s both; }
        .feed > *:nth-child(2){ animation: fadeUp 0.6s ease-out 0.22s both; }
        .feed > *:nth-child(3){ animation: fadeUp 0.6s ease-out 0.29s both; }
        .right > *:nth-child(1){ animation: fadeUp 0.6s ease-out 0.18s both; }
        .right > *:nth-child(2){ animation: fadeUp 0.6s ease-out 0.26s both; }

        /* Everything sits above the orb layer */
        .topbar, .layout { position: relative; z-index: 1; }

        /* ═══════════════════════════════════════════
           TOP BAR — mirrors login card glass treatment
        ═══════════════════════════════════════════ */
        .topbar {
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            /* Same glass formula as login .card */
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--border-mid);
            /* Login-matching shadow — depth only, no glow */
            box-shadow: 0 1px 0 rgba(255,255,255,0.05),
            0 4px 24px rgba(0,0,0,0.30);
        }

        .topbar strong {
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar input {
            width: 360px;
            /* Matches login input background level */
            background: rgba(15, 23, 42, 0.80);
            border: 1.5px solid rgba(100, 116, 139, 0.25);
            border-radius: var(--r-sm);
            padding: 9px 16px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .topbar input::placeholder { color: var(--text-muted); }

        .topbar input:focus {
            border-color: var(--accent-start);
            background: rgba(15, 23, 42, 0.95);
            /* Exact login input:focus shadow */
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.10),
            0 0 20px rgba(99, 102, 241, 0.15);
        }

        /* ── Avatar ── */
        .profile { position: relative; cursor: pointer; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-grad);
            /* Subtle border, matching login logo-circle */
            border: 1.5px solid rgba(255,255,255,0.20);
            box-shadow: 0 2px 8px rgba(0,0,0,0.30);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile:hover .avatar {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.30);
        }

        /* ═══════════════════════════════════════════
           PROFILE MENU
        ═══════════════════════════════════════════ */
        .profile-menu {
            position: absolute;
            right: 0;
            top: 50px;
            width: 220px;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-mid);
            border-radius: var(--r-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            animation: fadeUp 0.22s ease-out both;
        }

        .profile-menu.hidden { display: none; }

        .profile-head {
            display: flex;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            background: rgba(10, 14, 27, 0.40);
        }

        .profile-head strong {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
        }

        .profile-head small {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .profile-menu a {
            display: block;
            padding: 11px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            transition: background 0.2s ease, color 0.2s ease;
            position: relative;
        }

        .profile-menu a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 16px; right: 16px;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: left;
        }

        .profile-menu a:hover {
            background: rgba(99, 102, 241, 0.08);
            color: var(--text-primary);
        }

        .profile-menu a:hover::after { transform: scaleX(1); }

        .logout { color: #f87171 !important; border-top: 1px solid var(--border); }
        .logout:hover { background: rgba(248, 113, 113, 0.08) !important; }
        .logout::after { background: #f87171 !important; }

        /* ═══════════════════════════════════════════
           LAYOUT
        ═══════════════════════════════════════════ */
        .layout {
            display: grid;
            grid-template-columns: 240px 1fr 295px;
            gap: 18px;
            padding: 18px;
            min-height: calc(100vh - 64px);
        }


        /* ═══════════════════════════════════════════
           FEED
        ═══════════════════════════════════════════ */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ═══════════════════════════════════════════
           CARDS — login .card exact surface + shadow
        ═══════════════════════════════════════════ */
        .card {
            /* Darker than background — matches login .card over #0a0e27 */
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            padding: 22px;
            border: 1px solid var(--border-mid);
            /* Login card shadow — depth without glow */
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Top-light sheen — matches login inset 0 1px 0 rgba(255,255,255,0.1) */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
            transparent,
            rgba(255, 255, 255, 0.10),
            transparent);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lift);
        }

        /* ── Add Post Input — login input exact style ── */
        .add-post input {
            width: 100%;
            background: var(--card-deep);
            border: 1.5px solid rgba(100, 116, 139, 0.25);
            border-radius: var(--r-sm);
            padding: 13px 16px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13.5px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .add-post input::placeholder { color: var(--text-muted); }

        .add-post input:hover {
            border-color: rgba(99, 102, 241, 0.35);
            background: rgba(15, 23, 42, 0.90);
        }

        /* ── Badge — no gradient, reserved for interactive ── */
        .badge {
            background: rgba(10, 14, 27, 0.60);
            color: var(--text-secondary);
            border: 1px solid var(--border-mid);
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 15.5px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .card p {
            font-size: 13.5px;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.7;
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: 6px;
            margin-top: 16px;
            font-size: 13px;
        }

        .actions span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: 400;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .actions span:hover {
            background: rgba(10, 14, 27, 0.55);
            border-color: var(--border-mid);
            color: var(--text-secondary);
        }

        /* ── Comment Box — matches login input panel ── */
        .comment-box {
            margin-top: 16px;
            /* Deeper inset — login right-section depth */
            background: rgba(10, 14, 27, 0.55);
            border: 1px solid var(--border-mid);
            border-radius: var(--r-md);
            padding: 14px;
            animation: fadeUp 0.22s ease-out both;
        }

        .comment-box textarea {
            width: 100%;
            height: 64px;
            resize: none;
            border: none;
            background: transparent;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 300;
            line-height: 1.6;
        }

        .comment-box textarea::placeholder { color: var(--text-muted); }

        .comment-actions {
            text-align: right;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        /* Accent gradient — interactive element, matches login submit-btn */
        .comment-btn {
            padding: 7px 22px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-mid), var(--accent-end));
            color: white;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            font-family: var(--font-body);
            /* Login button shadow — not a glow, just depth */
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Shimmer — same as login submit-btn::before */
        .comment-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .comment-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(99, 102, 241, 0.45);
        }

        .comment-btn:hover::before { transform: translateX(100%); }

        .hidden { display: none !important; }

        /* ═══════════════════════════════════════════
           RIGHT PANEL
        ═══════════════════════════════════════════ */
        .right { display: flex; flex-direction: column; gap: 16px; }

        .small-card {
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            padding: 18px 20px;
            border: 1px solid var(--border-mid);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Top sheen — consistent lighting direction */
        .small-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent);
        }

        .small-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lift);
        }

        .small-card h4 {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .small-card > p {
            font-size: 13.5px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        /* ── Class Item — inset darker panel, login right-section depth ── */
        .class {
            background: rgba(10, 14, 27, 0.55);
            border-radius: var(--r-sm);
            padding: 13px 14px 13px 18px;
            border: 1px solid var(--border);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        /* Accent left strip — interactive identity, login gradient */
        .class::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--accent-grad);
        }

        .class:hover { border-color: var(--accent-border); }

        .class strong {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
            margin-bottom: 5px;
        }

        .class small {
            font-size: 11.5px;
            color: var(--text-secondary);
            font-weight: 300;
            display: block;
            line-height: 1.8;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr 280px;
                gap: 16px;
            }
            .sidebar { display: none; }
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
                padding: 12px;
            }
            .sidebar { display: none; }
            .right { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .topbar { padding: 0 16px; }
            .topbar input { width: 100%; max-width: 200px; }
        }

        @media (max-width: 480px) {
            .layout { grid-template-columns: 1fr; padding: 8px; }
            .right { grid-template-columns: 1fr; }
            .topbar { height: auto; flex-direction: column; padding: 12px; gap: 12px; }
            .topbar input { width: 100%; max-width: none; }
            .card { padding: 16px; }
        }

        /* ═══════════════════════════════════════════
           EMPTY STATE
        ═══════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 60px 28px;
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px dashed rgba(99, 102, 241, 0.22);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-card);
            animation: fadeUp 0.5s ease-out both;
        }

        .empty-state h3 {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13.5px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Accent button — login submit-btn matching */
        .empty-state button {
            margin-top: 22px;
            padding: 12px 30px;
            border: none;
            border-radius: var(--r-sm);
            background: linear-gradient(135deg, var(--accent-start), var(--accent-mid), var(--accent-end));
            color: white;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 13.5px;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .empty-state button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .empty-state button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.50);
        }

        .empty-state button:hover::before { transform: translateX(100%); }

        /* ═══════════════════════════════════════════
           MODAL — login card overlay treatment
        ═══════════════════════════════════════════ */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 27, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 0.2s ease-out both;
        }

        .modal.hidden { display: none !important; }

        .modal-box {
            width: 440px;
            /* Same glass as login .card */
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 26px;
            border-radius: var(--r-xl);
            border: 1px solid var(--border-mid);
            box-shadow: var(--shadow-card);
            animation: fadeUp 0.25s ease-out both;
            position: relative;
        }

        /* Top sheen */
        .modal-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
            border-radius: var(--r-xl) var(--r-xl) 0 0;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .modal-header h3 {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .modal-box textarea {
            width: 100%;
            height: 120px;
            resize: none;
            overflow-y: auto;
            /* Login input exact style */
            background: rgba(15, 23, 42, 0.80);
            border: 1.5px solid rgba(100, 116, 139, 0.25);
            border-radius: var(--r-sm);
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 300;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .modal-box textarea::placeholder { color: var(--text-muted); }

        .modal-box textarea:focus {
            border-color: var(--accent-start);
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.10),
            0 0 20px rgba(99, 102, 241, 0.15);
        }

        /* Post btn — login submit-btn */
        .modal-box button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: var(--r-sm);
            background: linear-gradient(135deg, var(--accent-start), var(--accent-mid), var(--accent-end));
            color: white;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .modal-box button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .modal-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.50);
        }

        .modal-box button:hover::before { transform: translateX(100%); }

        /* Cancel btn — login right-section dark inset */
        .modal-box button:last-child {
            background: rgba(10, 14, 27, 0.60);
            border: 1px solid var(--border-mid);
            color: var(--text-secondary);
            box-shadow: none;
        }

        .modal-box button:last-child:hover {
            background: rgba(10, 14, 27, 0.80);
            color: var(--text-primary);
            transform: none;
        }

        .close-btn {
            background: rgba(10, 14, 27, 0.60);
            border: 1px solid var(--border-mid);
            color: var(--text-muted);
            width: 30px; height: 30px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(99, 102, 241, 0.12);
            border-color: var(--accent-border);
            color: var(--text-primary);
        }

        /* ═══════════════════════════════════════════
           SCROLLBAR
        ═══════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.25);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.35);
        }
    </style>
</head>

<body>

<!-- Animated orbs — same markup as login page -->
<div class="animated-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<!-- ================= TOP BAR ================= -->
<div class="topbar">
    <strong>🎓 SMART CAMPUS</strong>
    <input placeholder="Search...">
    <div class="profile" onclick="toggleProfile()">
        <div class="avatar"></div>
        <div id="profileMenu" class="profile-menu hidden">
            <div class="profile-head">
                <div class="avatar"></div>
                <div>
                    <strong th:text="${session.studentName}">Student Name</strong><br>
                    <small th:text="${session.studentRollNumber}">Roll No</small>
                </div>
            </div>
            <a href="/student-profile">Profile</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </div>
</div>

<!-- ================= LAYOUT ================= -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a class="active">Home</a><a href="/student-profile">Profile</a><a href="/student-classroom">Classroom</a><a>Academics</a>
        <a href="/courseregistration">Course Registration</a><a>Survey</a><a href="/feedback">Feedback</a><a>Examinations</a>
        <a href="/online-exam">Online Exam</a><a href="/calendar">Calendar</a><a href="/drive">Drive</a><a>Help Center</a>
        <a>Hostel</a><a>Venue</a><a>Payments</a><a>Student Form</a>
    </div>

    <!-- FEED -->
    <div class="feed" id="feed"></div>

    <!-- RIGHT -->
    <div class="right">
        <div class="small-card">
            <h4>Today</h4><p>Holiday – Poosam</p>
        </div>
        <div class="small-card">
            <h4>Tomorrow</h4>
            <div class="class">
                <strong>Operating Systems</strong><br>
                <small>1:20 – 2:10 PM</small><br>
                <small>Practical · Beulah A</small>
            </div>
        </div>
    </div>
</div>

<!-- ================= MODAL ================= -->
<div id="postModal" class="modal hidden" onclick="closePostModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>CREATE POST</h3>
            <button class="close-btn" onclick="closePostModal()">✕</button>
        </div>
        <textarea placeholder="Write something..."></textarea>
        <button onclick="closePostModal()">Post</button>
        <button onclick="closePostModal()">Cancel</button>
    </div>
</div>

<script>
    /* ===== PROFILE ===== */
    function toggleProfile(){
        document.getElementById("profileMenu").classList.toggle("hidden");
    }

    document.addEventListener("click", e => {
        const profile = document.querySelector(".profile");
        if (!profile.contains(e.target)) {
            document.getElementById("profileMenu").classList.add("hidden");
        }
    });

    /* ===== MODAL ===== */
    function openPostModal(){
        document.getElementById("postModal").classList.remove("hidden");
    }
    function closePostModal(){
        document.getElementById("postModal").classList.add("hidden");
    }

    /* ===== POSTS (dynamic) ===== */
    const posts = [
        {category:"REC",title:"Welcome to Semester IV",content:"Dear students, welcome to the new semester..."}
    ];
    // const posts = []; // test empty state

    const feed = document.getElementById("feed");

    if(posts.length === 0){
        feed.innerHTML = `
    <div class="empty-state">
      <h3>No posts yet</h3>
      <p>Be the first to share something 🚀</p>
      <button onclick="openPostModal()">Create Post</button>
    </div>`;
    } else {
        feed.innerHTML = `<div class="card add-post">
    <input placeholder="Share something..." onclick="openPostModal()">
  </div>`;
        posts.forEach(p => {
            feed.innerHTML += `
      <div class="card">
        <span class="badge">${p.category}</span>
        <h3>${p.title}</h3>
        <p>${p.content}</p>
        <div class="actions">
          <span onclick="toggleComment(this)">💬 Comment</span>
          <span>🔁 Share</span>
        </div>
        <div class="comment-box hidden">
          <textarea placeholder="Write a comment..."></textarea>
          <div class="comment-actions">
            <button class="comment-btn">Post</button>
          </div>
        </div>
      </div>`;
        });
    }

    function toggleComment(el){
        el.parentElement.nextElementSibling.classList.toggle("hidden");
    }

    document.addEventListener("keydown", e => {
        if(e.key === "Escape") closePostModal();
    });
</script>

</body>
</html>
