<!DOCTYPE html>
<html>
<head>
  <title>Online Exams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-base: #0a0e27;
      --card-surface: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255,255,255,0.10);
      --card-sheen: inset 0 1px 0 rgba(255,255,255,0.10);
      --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
      --right-inset: rgba(10, 14, 27, 0.5);
      --input-bg: rgba(15, 23, 42, 0.8);
      --accent-1: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #ec4899;
      --accent-4: #06b6d4;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
    }

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== AMBIENT ORBS ===== */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: #6366f1;
      top: -150px; right: -100px;
      animation: floatOrb1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px; height: 500px;
      background: #ec4899;
      bottom: -120px; left: -80px;
      animation: floatOrb2 15s ease-in-out infinite;
    }

    .orb-3 {
      width: 400px; height: 400px;
      background: #06b6d4;
      top: 40%; right: 10%;
      animation: floatOrb3 10s ease-in-out infinite;
    }

    @keyframes floatOrb1 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-30px, 40px) scale(1.05); }
    }
    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(40px, -30px) scale(0.95); }
    }
    @keyframes floatOrb3 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-20px, 20px) scale(1.08); }
    }

    /* ===== TOPBAR ===== */
    .topbar, .container {
      position: relative;
      z-index: 1;
    }

    .topbar {
      height: 70px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 14, 39, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      box-shadow: var(--card-sheen), 0 1px 0 rgba(0,0,0,0.4);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-brand .icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    .topbar-brand h1 {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search-wrapper {
      position: relative;
      width: 38%;
    }

    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .topbar input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      backdrop-filter: blur(20px);
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      transition: all 0.25s ease;
      box-shadow: var(--card-sheen);
    }

    .topbar input::placeholder { color: var(--text-muted); }

    .topbar input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2), var(--card-sheen);
    }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .avatar:hover { transform: scale(1.05); }

    /* ===== CONTAINER ===== */
    .container {
      padding: 40px;
      max-width: 860px;
      margin: 0 auto;
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
      margin-bottom: 32px;
    }

    /* ===== EXAM SECTION ===== */
    .exam-section {
      margin-bottom: 24px;
      border-radius: 20px;
      overflow: hidden;
      background: var(--card-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow), var(--card-sheen);
      position: relative;
    }

    .exam-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }

    /* ===== EXAM HEADER ===== */
    .exam-header {
      padding: 14px 24px;
      background: var(--right-inset);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .exam-header .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* color-code each section */
    .exam-section.today .header-dot {
      background: #f59e0b;
      box-shadow: 0 0 8px #f59e0b;
    }

    .exam-section.upcoming .header-dot {
      background: var(--accent-4);
      box-shadow: 0 0 8px var(--accent-4);
    }

    .exam-section.previous .header-dot {
      background: var(--text-muted);
    }

    .exam-header span {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ===== EXAM BODY ===== */
    .exam-body {
      padding: 36px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.25s ease;
    }

    .exam-body .empty-icon {
      font-size: 16px;
      opacity: 0.5;
    }

    .exam-section:hover .exam-body {
      background: rgba(99,102,241,0.04);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
  </style>
</head>

<body>

<!-- AMBIENT ORBS -->
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="icon">🎓</div>
    <h1>COLLEGE PORTAL</h1>
  </div>

  <div class="search-wrapper">
    <span class="search-icon">⌕</span>
    <input type="text" placeholder="Search Digicampus">
  </div>

  <div class="avatar">S</div>
</div>

<!-- CONTAINER -->
<div class="container">

  <div class="page-title">Online Exam</div>

  <!-- Exams Today -->
  <div class="exam-section today">
    <div class="exam-header">
      <div class="header-dot"></div>
      <span>Exams Today</span>
    </div>
    <div class="exam-body">
      <span class="empty-icon">📋</span>
      No Exams Today
    </div>
  </div>

  <!-- Upcoming Exams -->
  <div class="exam-section upcoming">
    <div class="exam-header">
      <div class="header-dot"></div>
      <span>Upcoming Exams</span>
    </div>
    <div class="exam-body">
      <span class="empty-icon">🗓</span>
      No Upcoming Exams
    </div>
  </div>

  <!-- Previous Exams -->
  <div class="exam-section previous">
    <div class="exam-header">
      <div class="header-dot"></div>
      <span>Previous Exams</span>
    </div>
    <div class="exam-body">
      <span class="empty-icon">📁</span>
      No Previous Exams
    </div>
  </div>

</div>

</body>
</html>
