<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #0a0e27; color: #f1f5f9; min-height: 100vh; padding: 24px; }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0; }
        .orb.one { width: 420px; height: 420px; background: #6366f1; top: -110px; right: -110px; }
        .orb.two { width: 360px; height: 360px; background: #ec4899; bottom: -120px; left: -90px; }
        .page { max-width: 980px; margin: 0 auto; position: relative; z-index: 1; }
        .card {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.35);
            padding: 24px;
        }
        .topbar { display:flex; align-items:flex-start; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
        .title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; }
        .subtitle { font-size: 13px; color: #94a3b8; margin-top: 6px; }
        .btn {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 10px;
            padding: 9px 14px;
            background: rgba(139, 92, 246, 0.12);
            white-space: nowrap;
            display: inline-block;
        }
        .notice {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(239,68,68,0.25);
            background: rgba(239,68,68,0.10);
            color: #fecaca;
            margin-top: 14px;
        }
        .ok {
            border-color: rgba(34,197,94,0.25);
            background: rgba(34,197,94,0.10);
            color: #bbf7d0;
        }
        .q {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(2, 6, 23, 0.55);
            border-radius: 12px;
            padding: 14px;
            margin-top: 12px;
        }
        label { display:block; margin-bottom: 10px; font-weight: 600; color: #e2e8f0; }
        textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(2, 6, 23, 0.75);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 14px;
            padding: 12px 14px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            min-height: 90px;
            resize: vertical;
        }
        .opt { display:flex; gap: 10px; align-items: center; margin-top: 8px; color: #cbd5e1; }
        .actions { margin-top: 18px; display:flex; gap: 12px; flex-wrap: wrap; }
        .btn-primary {
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 14px;
            padding: 11px 18px;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            color: #fff;
        }
    </style>
</head>
<body>
<div class="orb one"></div>
<div class="orb two"></div>

<main class="page">
    <section class="card">
        <div class="topbar">
            <div>
                <div class="title" th:text="${quizTitle}">Quiz</div>
                <div class="subtitle">
                    <span th:text="${courseName}"></span>
                    <span th:if="${courseCode != null}" th:text="| (${courseCode})|"></span>
                    <span th:text="| · ${teacherName}|"></span>
                </div>
                <div class="subtitle" th:text="|Window: ${startAtText} to ${endAtText}|"></div>
                <div class="subtitle" th:text="|Duration: ${durationMinutes} min · Total: ${totalMarks} marks|"></div>
                <div class="subtitle" th:if="${instructions != null and !#strings.isEmpty(instructions)}" th:text="${instructions}"></div>
            </div>
            <a class="btn" th:href="@{/course/{code}(code=${courseCode})}">Back</a>
        </div>

        <div th:if="${alreadySubmitted}" class="notice ok">
            You already submitted this quiz.
            <span th:if="${scorePublished and score != null}" th:text="| Score: ${score}|"></span>
            <span th:if="${!scorePublished}" style="margin-left: 6px;">Quiz mark is not published</span>
        </div>

        <div th:if="${!alreadySubmitted and !inWindow}" class="notice">
            Quiz is not open right now. Please attempt within the given window.
        </div>

        <form th:if="${!alreadySubmitted and inWindow}" th:action="@{/quiz/{id}/submit(id=${quizId})}" method="post">
            <div th:each="q : ${questions}" class="q">
                <label th:text="${q.order + '. ' + q.text + ' (' + q.marks + ' marks)'}"></label>

                <div th:if="${q.type != null and q.type.equalsIgnoreCase('MCQ')}">
                    <div class="opt" th:each="opt,iter : ${q.options}">
                        <input type="radio" th:name="${'q_' + q.id}" th:value="${iter.index + 1}" required>
                        <span th:text="${opt}"></span>
                    </div>
                </div>

                <div th:if="${q.type == null or q.type.equalsIgnoreCase('DESCRIPTIVE')}">
                    <textarea th:name="${'q_' + q.id}" placeholder="Write your answer..."></textarea>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary">Submit Quiz</button>
                <a class="btn" th:href="@{/course/{code}(code=${courseCode})}">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
