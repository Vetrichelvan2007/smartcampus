<!DOCTYPE html>
<html>
<head>
  <title>Student Feedback</title>

  <style>

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: 64px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar h1 {
      font-size: 20px;
    }

    .topbar input {
      width: 40%;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #020617;
      color: #e5e7eb;
    }

    .topbar input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.25);
    }

    /* ===== CONTAINER ===== */
    .container {
      padding: 42px;
    }

    .page-title {
      margin-bottom: 25px;
      font-size: 22px;
      font-weight: 600;
    }

    /* ===== SEARCH BOX ===== */
    .search-box {
      margin-bottom: 25px;
    }

    .search-box input {
      width: 35%;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #020617;
      color: #e5e7eb;
    }

    .search-box input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.25);
    }

    /* ===== TABLE WRAPPER ===== */
    .table-wrapper {
      background: linear-gradient(
              180deg,
              rgba(2,6,23,.85),
              rgba(2,6,23,.65)
      );
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(255,255,255,0.05);
    }

    th, td {
      padding: 18px 24px;
      text-align: left;
    }

    th {
      font-weight: 600;
      color: #93c5fd;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background .2s ease;
    }

    tr:hover {
      background: rgba(59,130,246,.08);
    }

    /* ===== STATUS BADGES ===== */
    .status {
      font-weight: 600;
      letter-spacing: .5px;
    }

    .submitted {
      color: #22c55e;
    }

    .not-submitted {
      color: #ef4444;
    }

  </style>

</head>
<body>

<div class="topbar">
  <h1>🎓 College Portal</h1>
  <input type="text" placeholder="Search Digicampus">
</div>

<div class="container">

  <div class="page-title">
    Feedback
  </div>

  <div class="search-box">
    <input type="text" placeholder="Search by Feedback">
  </div>

  <div class="table-wrapper">

    <table>
      <thead>
      <tr>
        <th>Feedback Name</th>
        <th>Term</th>
        <th>Status</th>
      </tr>
      </thead>

      <tbody>
      <tr>
        <td>B.E/B.Tech_25-26_Mid Term Feedback_2024 Batch_3rd Sem</td>
        <td>B.E/B.Tech ACY 2025-26 ODD_3rd Sem</td>
        <td class="status submitted">SUBMITTED</td>
      </tr>

      <tr>
        <td>B.E/B.Tech_25-26_End Term Course Feedback_2024 Batch_3rd Sem</td>
        <td>B.E/B.Tech ACY 2025-26 ODD_3rd Sem</td>
        <td class="status not-submitted">NOT SUBMITTED</td>
      </tr>
      </tbody>

    </table>

  </div>

</div>

</body>
</html>
