<!DOCTYPE html>
<html>
<head>
  <title>Online Exams</title>

  <style>

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: 64px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar h1 {
      font-size: 20px;
    }

    .topbar input {
      width: 40%;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #020617;
      color: #e5e7eb;
    }

    .topbar input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.25);
    }

    /* ===== CONTAINER ===== */
    .container {
      padding: 42px;
      max-width: 900px;
      margin: auto;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    /* ===== EXAM SECTION ===== */
    .exam-section {
      margin-bottom: 35px;
    }

    .exam-header {
      padding: 14px 20px;
      border-radius: 16px 16px 0 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      font-weight: 600;
      color: #93c5fd;
    }

    .exam-body {
      padding: 30px;
      border-radius: 0 0 16px 16px;
      background: linear-gradient(
              180deg,
              rgba(2,6,23,.85),
              rgba(2,6,23,.65)
      );
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      color: #9ca3af;
      font-weight: 500;
    }

    /* Hover effect */
    .exam-body:hover {
      background: rgba(59,130,246,.08);
      transition: .25s ease;
    }

  </style>

</head>
<body>

<div class="topbar">
  <h1>🎓 College Portal</h1>
  <input type="text" placeholder="Search Digicampus">
</div>

<div class="container">

  <div class="page-title">
    Online Exam
  </div>

  <!-- Exams Today -->
  <div class="exam-section">
    <div class="exam-header">
      Exams Today
    </div>
    <div class="exam-body">
      No Exams Today
    </div>
  </div>

  <!-- Upcoming Exams -->
  <div class="exam-section">
    <div class="exam-header">
      Upcoming Exams
    </div>
    <div class="exam-body">
      No Upcoming Exams
    </div>
  </div>

  <!-- Previous Exams -->
  <div class="exam-section">
    <div class="exam-header">
      Previous Exams
    </div>
    <div class="exam-body">
      No Previous Exams
    </div>
  </div>

</div>

</body>
</html>
