<!DOCTYPE html>
<html>
<head>
  <title>Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-base: #0a0e27;
      --card-surface: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255,255,255,0.10);
      --card-sheen: inset 0 1px 0 rgba(255,255,255,0.10);
      --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
      --right-inset: rgba(10, 14, 27, 0.5);
      --input-bg: rgba(15, 23, 42, 0.8);
      --accent-1: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #ec4899;
      --accent-4: #06b6d4;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
    }

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== AMBIENT ORBS ===== */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: #6366f1;
      top: -150px; right: -100px;
      animation: floatOrb1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px; height: 500px;
      background: #ec4899;
      bottom: -120px; left: -80px;
      animation: floatOrb2 15s ease-in-out infinite;
    }

    .orb-3 {
      width: 400px; height: 400px;
      background: #06b6d4;
      top: 40%; right: 10%;
      animation: floatOrb3 10s ease-in-out infinite;
    }

    @keyframes floatOrb1 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-30px, 40px) scale(1.05); }
    }
    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(40px, -30px) scale(0.95); }
    }
    @keyframes floatOrb3 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-20px, 20px) scale(1.08); }
    }

    /* ===== TOPBAR ===== */
    .topbar, .container {
      position: relative;
      z-index: 1;
    }

    .topbar {
      height: 70px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 14, 39, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      box-shadow: var(--card-sheen), 0 1px 0 rgba(0,0,0,0.4);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-brand .icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    .topbar-brand h1 {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .avatar:hover { transform: scale(1.05); }

    /* ===== LAYOUT ===== */
    .container {
      display: flex;
      padding: 30px;
      gap: 24px;
      align-items: flex-start;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--card-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 24px 18px;
      box-shadow: var(--card-shadow), var(--card-sheen);
      position: sticky;
      top: 20px;
    }

    .sidebar-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-header h3 {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .sidebar label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      transition: background 0.2s ease;
    }

    .sidebar label:hover {
      background: rgba(99,102,241,0.08);
      color: var(--text-primary);
    }

    .sidebar label input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 5px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .sidebar label input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border-color: var(--accent-1);
    }

    .sidebar label input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 10px;
      font-weight: 700;
    }

    /* ===== CALENDAR CONTAINER ===== */
    .calendar-container {
      flex: 1;
      min-width: 0;
      background: var(--card-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 26px;
      box-shadow: var(--card-shadow), var(--card-sheen);
      position: relative;
    }

    .calendar-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      border-radius: 22px 22px 0 0;
    }

    /* ===== CALENDAR HEADER ===== */
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    #monthYear {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: var(--right-inset);
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
      padding: 7px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.22s ease;
      box-shadow: var(--card-sheen);
    }

    .nav-btn:hover {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.12));
      border-color: rgba(99,102,241,0.3);
      color: #c7d2fe;
    }

    /* ===== CALENDAR GRID ===== */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-name {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 8px 0;
      text-transform: uppercase;
    }

    .day {
      min-height: 90px;
      padding: 8px;
      border-radius: 12px;
      background: var(--right-inset);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .day:hover {
      background: rgba(99,102,241,0.1);
      border-color: rgba(99,102,241,0.2);
      transform: translateY(-1px);
    }

    .day.today {
      border: 1px solid rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.12);
    }

    .day.today .date {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .date {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== EVENT DETAILS ===== */
    .event-details {
      width: 240px;
      flex-shrink: 0;
      background: var(--card-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 24px 18px;
      box-shadow: var(--card-shadow), var(--card-sheen);
      position: sticky;
      top: 20px;
    }

    .event-details-header {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .event-details-header h3 {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .event-details p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
  </style>
</head>

<body>

<!-- AMBIENT ORBS -->
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="icon">📅</div>
    <h1>COLLEGE PORTAL</h1>
  </div>
  <div class="avatar">S</div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Calendars</h3>
    </div>
    <label><input type="checkbox" checked> Academic Calendar</label>
    <label><input type="checkbox" checked> Institutional Calendar</label>
    <label><input type="checkbox" checked> Events</label>
  </div>

  <!-- CALENDAR -->
  <div class="calendar-container">

    <div class="calendar-header">
      <div class="header-buttons">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <button class="nav-btn" onclick="goToToday()">Today</button>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>

      <h2 id="monthYear"></h2>

      <div></div>
    </div>

    <div class="calendar-grid" id="calendarDays"></div>

  </div>

  <!-- EVENT DETAILS -->
  <div class="event-details">
    <div class="event-details-header">
      <h3>Event Details</h3>
    </div>
    <p>Select a date to see events.</p>
  </div>

</div>

<script>

  let currentDate = new Date();

  function renderCalendar() {

    const monthYear = document.getElementById("monthYear");
    const calendarDays = document.getElementById("calendarDays");

    calendarDays.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    monthYear.innerText = currentDate.toLocaleString("default", {
      month: "long",
      year: "numeric"
    });

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    dayNames.forEach(day => {
      const div = document.createElement("div");
      div.className = "day-name";
      div.innerText = day;
      calendarDays.appendChild(div);
    });

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      calendarDays.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dayDiv = document.createElement("div");
      dayDiv.className = "day";

      const today = new Date();
      if (
              day === today.getDate() &&
              month === today.getMonth() &&
              year === today.getFullYear()
      ) {
        dayDiv.classList.add("today");
      }

      dayDiv.innerHTML = `<div class="date">${day}</div>`;
      calendarDays.appendChild(dayDiv);
    }
  }

  function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
  }

  function goToToday() {
    currentDate = new Date();
    renderCalendar();
  }

  renderCalendar();

</script>

</body>
</html>
