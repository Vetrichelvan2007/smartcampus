<!DOCTYPE html>
<html>
<head>
  <title>Calendar</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: 64px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .container {
      display: flex;
      padding: 30px;
      gap: 30px;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
    }

    .sidebar h3 {
      margin-bottom: 20px;
    }

    .sidebar label {
      display: block;
      margin-bottom: 12px;
    }

    /* ===== CALENDAR ===== */
    .calendar-container {
      flex: 1;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header-buttons {
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      background: rgba(59,130,246,.25);
      border: none;
      color: #60a5fa;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: rgba(59,130,246,.45);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-name {
      text-align: center;
      font-weight: 600;
      color: #93c5fd;
    }

    .day {
      min-height: 100px;
      padding: 8px;
      border-radius: 14px;
      background: linear-gradient(
              180deg,
              rgba(2,6,23,.85),
              rgba(2,6,23,.65)
      );
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      position: relative;
    }

    .day:hover {
      background: rgba(59,130,246,.08);
    }

    .day.today {
      border: 2px solid #3b82f6;
    }

    .date {
      font-weight: 600;
    }

    /* ===== EVENT DETAILS ===== */
    .event-details {
      width: 280px;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
    }

    .event-details h3 {
      margin-bottom: 15px;
      color: #93c5fd;
    }

  </style>
</head>
<body>

<div class="topbar">
  <h2>📅 Calendar</h2>
</div>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Calendar Options</h3>
    <label><input type="checkbox" checked> Academic Calendar</label>
    <label><input type="checkbox" checked> Institutional Calendar</label>
    <label><input type="checkbox" checked> Events</label>
  </div>

  <!-- Calendar -->
  <div class="calendar-container">

    <div class="calendar-header">

      <div class="header-buttons">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <button class="nav-btn" onclick="goToToday()">Today</button>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>

      <h2 id="monthYear"></h2>

      <div></div>
    </div>

    <div class="calendar-grid" id="calendarDays"></div>

  </div>

  <!-- Event Details -->
  <div class="event-details">
    <h3>Event Details</h3>
    <p>Select a date to see events.</p>
  </div>

</div>

<script>

  let currentDate = new Date();

  function renderCalendar() {

    const monthYear = document.getElementById("monthYear");
    const calendarDays = document.getElementById("calendarDays");

    calendarDays.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    monthYear.innerText = currentDate.toLocaleString("default", {
      month: "long",
      year: "numeric"
    });

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    dayNames.forEach(day => {
      const div = document.createElement("div");
      div.className = "day-name";
      div.innerText = day;
      calendarDays.appendChild(div);
    });

    // Empty spaces before first day
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      calendarDays.appendChild(empty);
    }

    // Create days
    for (let day = 1; day <= daysInMonth; day++) {

      const dayDiv = document.createElement("div");
      dayDiv.className = "day";

      const today = new Date();
      if (
              day === today.getDate() &&
              month === today.getMonth() &&
              year === today.getFullYear()
      ) {
        dayDiv.classList.add("today");
      }

      dayDiv.innerHTML = `<div class="date">${day}</div>`;
      calendarDays.appendChild(dayDiv);
    }
  }

  function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
  }

  function goToToday() {
    currentDate = new Date();
    renderCalendar();
  }

  renderCalendar();

</script>

</body>
</html>
