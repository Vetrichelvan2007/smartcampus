<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e5e7eb;
            line-height: 1.5;
        }

        .topbar {
            height: 64px;
            padding: 0 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .topbar h1 {
            font-size: 20px;
        }

        .topbar input {
            width: 40%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #020617;
            color: #e5e7eb;
        }

        .container {
            padding: 42px;
        }

        .layout {
            display: flex;
            gap: 40px;
        }

        .sidebar {
            width: 240px;
            background: rgba(2, 6, 23, 0.75);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 24px;
        }

        .sidebar h3 {
            margin-bottom: 18px;
        }

        .sem-btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: none;
            background: #020617;
            color: #9ca3af;
        }

        .sem-btn.active {
            background: rgba(59,130,246,.28);
            color: #60a5fa;
            font-weight: 600;
        }

        .content {
            flex: 1;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .course-card {
            position: relative;
            padding: 30px 26px;
            border-radius: 24px;
            background: linear-gradient(
                    180deg,
                    rgba(2,6,23,.85),
                    rgba(2,6,23,.65)
            );
            border: 1px solid rgba(255,255,255,0.08);
        }

        .course-card h3 {
            font-size: 19px;
            margin-bottom: 8px;
        }

        .code {
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 15px;
        }

        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .theory {
            background: rgba(59,130,246,.18);
            color: #3b82f6;
        }

        .lot {
            background: rgba(34,197,94,.18);
            color: #22c55e;
        }

        select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #020617;
            color: #e5e7eb;
            margin-bottom: 15px;
        }

        .register-btn {
            width: 100%;
            padding: 10px;
            border-radius: 14px;
            border: none;
            background: rgba(59,130,246,.28);
            color: #60a5fa;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-all {
            margin-top: 40px;
            padding: 14px 24px;
            border-radius: 16px;
            border: none;
            background: rgba(34,197,94,.25);
            color: #22c55e;
            font-weight: 600;
        }

    </style>
</head>

<body>

<div class="topbar">
    <h1>🎓 College Portal</h1>
    <input type="text" placeholder="Search courses...">
</div>

<div class="container">
    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Semester</h3>

            <button class="sem-btn active"
                    th:text="'Semester ' + ${current_semester}">
            </button>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <h2 style="margin-bottom: 25px;">
                Course Registration - Semester
                <span th:text="${current_semester}"></span>
            </h2>

            <div class="course-grid">

                <!-- 🔥 CORRECT MANY-TO-MANY RENDERING -->
                <div class="course-card"
                     th:each="course : ${courses}">

                    <span class="badge"
                          th:text="${course.courseType}"
                          th:classappend="${course.courseType == 'LAB'} ? ' lot' : ' theory'">
                    </span>

                    <h3 th:text="${course.courseName}"></h3>

                    <div class="code"
                         th:text="'Course Code: ' + ${course.courseCode}">
                    </div>

                    <select>
                        <option value="">Select Teacher</option>

                        <option th:each="i : ${#numbers.sequence(0, course.teacherNames.size() - 1)}"
                                th:value="${course.teacherIds[i]}"
                                th:text="${course.teacherNames[i]}">
                        </option>

                    </select>

                    <button class="register-btn">Register</button>

                </div>

            </div>

            <button class="submit-all">Submit All Courses</button>

        </div>
    </div>
</div>

</body>
</html>
