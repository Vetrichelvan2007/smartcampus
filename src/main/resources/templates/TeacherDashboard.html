<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#020617);
            color:#e2e8f0;
            display:flex;
        }

        /* Sidebar */
        .sidebar{
            width:250px;
            height:100vh;
            background:#0b1120;
            padding:20px;
            position:fixed;
        }

        .sidebar h2{
            color:#38bdf8;
            margin-bottom:30px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            padding:12px;
            margin-bottom:10px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        .sidebar ul li:hover{
            background:#1e293b;
        }

        /* Profile at bottom of sidebar */
        .sidebar .profile-bottom{
            position:absolute;
            bottom:20px;
            width:85%;
            padding:10px;
            background:#1e293b;
            border-radius:10px;
            text-align:center;
        }

        /* Main */
        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        /* Topbar */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .search-box input{
            padding:8px 12px;
            border-radius:20px;
            border:none;
            background:#1e293b;
            color:white;
        }

        /* Profile Icon */
        .profile-container{
            position:relative;
            cursor:pointer;
        }

        .profile-icon{
            width:40px;
            height:40px;
            border-radius:50%;
            background:linear-gradient(45deg,#38bdf8,#6366f1);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }

        /* Dropdown */
        .dropdown{
            position:absolute;
            right:0;
            top:55px;
            background:#1e293b;
            width:150px;
            border-radius:10px;
            display:none;
            flex-direction:column;
            box-shadow:0 0 10px rgba(0,0,0,0.4);
        }

        .dropdown a{
            padding:10px;
            text-decoration:none;
            color:#e2e8f0;
            transition:.3s;
        }

        .dropdown a:hover{
            background:#334155;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Teacher Panel</h2>
    <ul>
        <li>Dashboard</li>
        <li>My Classes</li>
        <li>Attendance</li>
        <li>Assignments</li>
        <li>Exams</li>
        <li>Marks Entry</li>
        <li>Announcements</li>
    </ul>

    <!-- Bottom Profile in Sidebar -->
    <div class="profile-bottom">
        👤 Profile
    </div>
</div>

<div class="main">

    <div class="topbar">
        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

        <!-- Profile Icon Top Right -->
        <div class="profile-container" onclick="toggleDropdown()">
            <div class="profile-icon">T</div>

            <div class="dropdown" id="profileDropdown">
                <a href="#">My Profile</a>
                <a href="#">Settings</a>
                <a href="#">Logout</a>
            </div>
        </div>
    </div>

    <h1>Welcome, Professor</h1>

</div>

<script>
    function toggleDropdown(){
        const dropdown = document.getElementById("profileDropdown");
        dropdown.style.display =
            dropdown.style.display === "flex" ? "none" : "flex";
    }

    /* Close dropdown when clicking outside */
    window.onclick = function(e){
        if(!e.target.closest(".profile-container")){
            document.getElementById("profileDropdown").style.display = "none";
        }
    }
</script>

</body>
</html>
