<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Course</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

    body{
      background:radial-gradient(circle at top,#0f172a,#020617);
      color:#e5e7eb;
      min-height:100vh;
    }

    /* TOPBAR */
    .topbar{
      height:64px;
      padding:0 36px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(15,23,42,.9);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .search{
      width:40%;
      padding:12px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#020617;
      color:#fff;
    }

    /* WRAPPER */
    .wrapper{padding:40px;max-width:1200px;margin:auto}

    /* HEADER CARD */
    .course-header{
      background:rgba(2,6,23,.7);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:28px 32px;
      margin-bottom:28px;
    }

    .course-title{font-size:22px;font-weight:600;margin-bottom:6px}
    .course-meta{color:#94a3b8;font-size:14px}

    /* TABS */
    .tabs{display:flex;gap:14px;margin-top:22px}

    .tab{
      padding:10px 18px;
      border-radius:999px;
      background:#020617;
      color:#9ca3af;
      border:1px solid rgba(255,255,255,.06);
      cursor:pointer;
      transition:.25s;
    }

    .tab:hover{
      background:rgba(59,130,246,.18);
      color:#bfdbfe;
    }

    .tab.active{
      background:rgba(59,130,246,.28);
      color:#60a5fa;
      font-weight:600;
    }

    /* PANEL */
    .panel{
      background:rgba(2,6,23,.65);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:28px;
    }

    /* TOOLBAR */
    .toolbar{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      gap:10px;
    }

    .toolbar input{
      width:60%;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#020617;
      color:#fff;
    }

    .btn{
      padding:10px 18px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      background:rgba(59,130,246,.25);
      color:#bfdbfe;
    }

    /* TABLE */
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
    }
    .table th{color:#93c5fd}
    .row:hover{background:rgba(59,130,246,.08)}

    .empty{text-align:center;padding:40px;color:#64748b}

    .tab-body{display:none}
    .tab-body.active{display:block}

  </style>
</head>

<body>

<header class="topbar">
  <h2>📘 Course</h2>
  <input class="search" placeholder="Search inside course...">
</header>

<div class="wrapper">

  <!-- COURSE HEADER -->
  <div class="course-header">
    <div class="course-title" th:text="${courseName}">Course Name</div>
    <div class="course-meta" th:text="'Course Code: ' + ${courseId}">Course Code</div>

    <!-- NAV TABS -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('resources',this)">Resource</button>
      <button class="tab" onclick="showTab('coursework',this)">Course Work</button>
      <button class="tab" onclick="showTab('quizzes',this)">Quizzes</button>
      <button class="tab" onclick="showTab('assignment',this)">Assignment</button>
    </div>
  </div>

  <!-- ================= RESOURCES PANEL ================= -->
  <div class="panel tab-body active" id="resources">

    <div class="toolbar">
      <input placeholder="Search resources...">
      <div>
        <button class="btn">Download ZIP</button>
        <button class="btn">Download</button>
      </div>
    </div>

    <table class="table">
      <thead>
      <tr>
        <th>Title</th>
        <th>Module</th>
        <th>Type</th>
      </tr>
      </thead>

      <tbody>
      <tr class="row" th:each="r : ${resources}">
        <td th:text="${r.title}"></td>
        <td th:text="${r.module}"></td>
        <td th:text="${r.type}"></td>
      </tr>
      </tbody>
    </table>

    <div class="empty" th:if="${#lists.isEmpty(resources)}">
      No Resources Found
    </div>

  </div>

  <!-- ================= QUIZ PANEL ================= -->
  <div class="panel tab-body" id="quizzes">

    <h3 style="margin-bottom:18px;color:#93c5fd;">Quizzes</h3>

    <table class="table">
      <thead>
      <tr>
        <th>Quiz</th>
        <th>Start</th>
        <th>End</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>
      <tr class="row" th:each="q : ${quizzes}">
        <td th:text="${q.title}"></td>
        <td th:text="${q.start}"></td>
        <td th:text="${q.end}"></td>
        <td><button class="btn">Open</button></td>
      </tr>
      </tbody>
    </table>

    <div class="empty" th:if="${#lists.isEmpty(quizzes)}">
      No Quizzes Available
    </div>

  </div>

  <!-- EMPTY PANELS FOR NOW -->
  <div class="panel tab-body" id="coursework">
    <div class="empty">Course Work Coming Soon</div>
  </div>

  <div class="panel tab-body" id="assignment">
    <div class="empty">Assignments Coming Soon</div>
  </div>

</div>

<script>
  function showTab(id,btn){

    document.querySelectorAll(".tab-body")
            .forEach(x=>x.classList.remove("active"));

    document.getElementById(id)
            .classList.add("active");

    document.querySelectorAll(".tab")
            .forEach(x=>x.classList.remove("active"));

    btn.classList.add("active");
  }
</script>

</body>
</html>
