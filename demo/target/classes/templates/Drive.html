<!DOCTYPE html>
<html>
<head>
    <title>My Drive</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #e5e7eb;
        }

        .topbar {
            height: 64px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .container {
            padding: 40px 60px;
        }

        .breadcrumb {
            margin-bottom: 20px;
            color: #93c5fd;
            font-weight: 500;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .left-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-upload {
            background: rgba(34,197,94,.25);
            color: #22c55e;
        }

        .btn-folder {
            background: rgba(59,130,246,.25);
            color: #60a5fa;
        }

        .search-box input {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #020617;
            color: #e5e7eb;
            width: 260px;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(
                    180deg,
                    rgba(2,6,23,.85),
                    rgba(2,6,23,.65)
            );
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .file-table th,
        .file-table td {
            padding: 16px 20px;
            text-align: left;
        }

        .file-table th {
            background: rgba(255,255,255,0.05);
            color: #93c5fd;
        }

        .file-table tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background .2s;
        }

        .file-table tr:hover {
            background: rgba(59,130,246,.08);
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .folder-icon { color: #facc15; }
        .file-icon { color: #60a5fa; }

        .owner, .modified {
            color: #9ca3af;
        }

        .hidden-row {
            display: none;
        }

        .indent-1 { padding-left: 40px !important; }
        .indent-2 { padding-left: 70px !important; }

    </style>

</head>
<body>

<div class="topbar">
    <h2>📂 Drive</h2>
</div>

<div class="container">

    <div class="breadcrumb">
        Drive > My Drive
    </div>

    <div class="action-bar">
        <div class="left-actions">
            <button class="btn btn-upload">⬆ Upload</button>
            <button class="btn btn-folder">📁 New Folder</button>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search in Drive...">
        </div>
    </div>

    <table class="file-table">

        <thead>
        <tr>
            <th>Title</th>
            <th>Owner</th>
            <th>Last Modified</th>
        </tr>
        </thead>

        <tbody>

        <!-- FOLDER 1 -->
        <tr onclick="toggleFolder('courses')">
            <td class="file-name">
                <span class="folder-icon">📁</span>
                Courses
            </td>
            <td class="owner">You</td>
            <td class="modified">Jul 12, 2024</td>
        </tr>

        <tr class="hidden-row courses">
            <td class="file-name indent-1">
                <span class="file-icon">📄</span>
                DBMS Notes.pdf
            </td>
            <td class="owner">You</td>
            <td class="modified">2 days ago</td>
        </tr>

        <tr class="hidden-row courses">
            <td class="file-name indent-1">
                <span class="file-icon">📄</span>
                OS Assignment.docx
            </td>
            <td class="owner">You</td>
            <td class="modified">1 week ago</td>
        </tr>

        <!-- FOLDER 2 -->
        <tr onclick="toggleFolder('booth')">
            <td class="file-name">
                <span class="folder-icon">📁</span>
                Booth
            </td>
            <td class="owner">You</td>
            <td class="modified">Jul 12, 2024</td>
        </tr>

        <tr class="hidden-row booth">
            <td class="file-name indent-1">
                <span class="file-icon">📄</span>
                Poster.png
            </td>
            <td class="owner">You</td>
            <td class="modified">3 months ago</td>
        </tr>

        <!-- NORMAL FILE -->
        <tr>
            <td class="file-name">
                <span class="file-icon">📄</span>
                Resume.pdf
            </td>
            <td class="owner">You</td>
            <td class="modified">6 months ago</td>
        </tr>

        </tbody>
    </table>

</div>

<script>

    function toggleFolder(folderClass) {

        const rows = document.querySelectorAll("." + folderClass);

        rows.forEach(row => {
            if (row.style.display === "table-row") {
                row.style.display = "none";
            } else {
                row.style.display = "table-row";
            }
        });

    }

</script>

</body>
</html>
