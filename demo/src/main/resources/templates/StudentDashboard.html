<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Portal Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#0b1220;
            --card:#0f172a;
            --panel:#020617;
            --accent:#4f46e5;
            --accent2:#22c55e;
            --text:#e5e7eb;
            --muted:#94a3b8;
            --border:#1e293b;
        }

        *{box-sizing:border-box;font-family:Inter}

        html,body{height:100%;margin:0}

        body{
            background:#020617;
            color:var(--text);
        }

        /* ================= TOP BAR ================= */
        .topbar{
            height:70px;
            position:sticky;
            top:0;
            z-index:10;
            background:#020617cc;
            backdrop-filter:blur(10px);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 30px;
            border-bottom:1px solid var(--border);
        }

        .topbar input{
            width:420px;
            background:#020617;
            border:1px solid var(--border);
            border-radius:10px;
            padding:10px 14px;
            color:var(--text);
        }

        .profile{position:relative;cursor:pointer}

        .avatar{
            width:38px;height:38px;border-radius:50%;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
        }

        /* ================= PROFILE MENU ================= */
        .profile-menu{
            position:absolute;right:0;top:50px;width:220px;
            background:var(--card);border:1px solid var(--border);
            border-radius:14px;overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,.5);
        }
        .profile-menu.hidden{display:none}

        .profile-head{
            display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);
        }
        .profile-menu a{
            display:block;padding:12px 14px;color:var(--text);text-decoration:none;
        }
        .profile-menu a:hover{background:#1e293b}
        .logout{color:#f87171}

        /* ================= LAYOUT ================= */
        .layout{
            display:grid;
            grid-template-columns:260px 1fr 320px;
            gap:20px;
            padding:20px;
            min-height:calc(100vh - 70px);
            background:radial-gradient(circle at top,#1e293b,#020617);
        }

        /* ================= SIDEBAR ================= */
        .sidebar{
            background:var(--card);
            border-radius:18px;
            padding:16px;
            height:100%;
            overflow-y:auto;
        }
        .sidebar a{
            display:flex;align-items:center;gap:12px;
            padding:10px 12px;border-radius:10px;
            color:var(--muted);text-decoration:none;
            margin-bottom:6px;
        }
        .sidebar a:hover,.sidebar a.active{background:#1e293b;color:white}

        /* ================= FEED ================= */
        .feed{display:flex;flex-direction:column;gap:20px}

        .card{
            background:var(--card);
            border-radius:18px;
            padding:20px;
            border:1px solid var(--border);
            transition:.25s;
        }
        .card:hover{transform:translateY(-3px)}

        .add-post input{
            width:100%;background:#020617;border:1px solid var(--border);
            border-radius:10px;padding:14px;color:var(--text);
        }

        .badge{
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            padding:4px 10px;border-radius:20px;font-size:12px;
            display:inline-block;margin-bottom:10px;
        }

        .actions{
            display:flex;gap:20px;margin-top:10px;color:var(--muted);cursor:pointer
        }

        /* ===== COMMENTS ===== */
        .comment-box{
            margin-top:15px;
            background:#020617;
            border:1px solid var(--border);
            border-radius:12px;
            padding:12px;
        }
        .comment-box textarea{
            width:100%;height:60px;resize:none;border:none;
            background:transparent;color:var(--text);outline:none;
        }
        .comment-actions{text-align:right;margin-top:10px}
        .comment-btn{
            padding:6px 16px;border:none;border-radius:20px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:white;cursor:pointer;font-size:13px;
        }

        .hidden{display:none}

        .right{display:flex;flex-direction:column;gap:20px}
        .small-card{
            background:var(--card);border-radius:18px;
            padding:18px;border:1px solid var(--border);
        }
        .class{
            background:#020617;border-radius:12px;padding:12px;
            border:1px solid var(--border);margin-top:10px;
        }

        .empty-state{
            text-align:center;
            padding:50px 20px;
            background:var(--card);
            border:1px dashed var(--border);
            border-radius:18px;
            color:var(--muted);
        }
        .empty-state h3{color:var(--text)}
        .empty-state button{
            margin-top:15px;
            padding:10px 22px;
            border:none;border-radius:25px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:white;
        }

        /* ================= MODAL ================= */
        .modal{
            position:fixed;inset:0;background:#00000080;
            display:flex;align-items:center;justify-content:center;z-index:50;
        }
        .modal.hidden{display:none}

        .modal-box{
            width:420px;background:var(--card);
            padding:20px;border-radius:16px;
        }
        .modal-header{
            display:flex;justify-content:space-between;align-items:center;
        }
        .modal-box textarea{
            width:100%;height:120px;resize:none;overflow-y:auto;
            background:#020617;border:1px solid var(--border);
            border-radius:10px;padding:12px;color:var(--text);
        }
        .modal-box button{
            margin-top:10px;padding:10px;width:100%;
            border:none;border-radius:10px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:white;
        }
        .close-btn{
            background:none;border:none;color:var(--muted);
            font-size:20px;cursor:pointer;
        }
    </style>
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">
    <strong>🎓 College Portal</strong>
    <input placeholder="Search...">
    <div class="profile" onclick="toggleProfile()">
        <div class="avatar"></div>
        <div id="profileMenu" class="profile-menu hidden">
            <div class="profile-head">
                <div class="avatar"></div>
                <div>
                    <strong th:text="${session.studentName}">Student Name</strong><br>
                    <small th:text="${session.studentRollNumber}">Roll No</small>
                </div>
            </div>
            <a href="/student-profile">Profile</a>
            <a href="/login" class="logout">Logout</a>
        </div>
    </div>
</div>

<!-- ================= LAYOUT ================= -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a class="active">Home</a><a href="/student-profile">Profile</a><a href="/student-classroom">Classroom</a><a>Academics</a>
        <a href="/courseregistration">Course Registration</a><a>Survey</a><a href="/feedback">Feedback</a><a>Examinations</a>
        <a href="/online-exam">Online Exam</a><a href="/calendar">Calendar</a><a href="/drive">Drive</a><a>Help Center</a>
        <a>Hostel</a><a>Venue</a><a>Payments</a><a>Student Form</a>
    </div>

    <!-- FEED -->
    <div class="feed" id="feed"></div>

    <!-- RIGHT -->
    <div class="right">
        <div class="small-card">
            <h4>Today</h4><p>Holiday – Poosam</p>
        </div>
        <div class="small-card">
            <h4>Tomorrow</h4>
            <div class="class">
                <strong>Operating Systems</strong><br>
                <small>1:20 – 2:10 PM</small><br>
                <small>Practical · Beulah A</small>
            </div>
        </div>
    </div>
</div>

<!-- ================= MODAL ================= -->
<div id="postModal" class="modal hidden" onclick="closePostModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>Create Post</h3>
            <button class="close-btn" onclick="closePostModal()">✕</button>
        </div>
        <textarea placeholder="Write something..."></textarea>
        <button onclick="closePostModal()">Post</button>
        <button onclick="closePostModal()" style="background:#1e293b">Cancel</button>
    </div>
</div>

<script>
    /* ===== PROFILE ===== */
    function toggleProfile(){
        document.getElementById("profileMenu").classList.toggle("hidden");
    }

    /* ===== MODAL ===== */
    function openPostModal(){
        document.getElementById("postModal").classList.remove("hidden");
    }
    function closePostModal(){
        document.getElementById("postModal").classList.add("hidden");
    }

    /* ===== POSTS (dynamic) ===== */
    const posts = [
        {category:"REC",title:"Welcome to Semester IV",content:"Dear students, welcome to the new semester..."}
    ];
    // const posts = []; // test empty state

    const feed = document.getElementById("feed");

    if(posts.length === 0){
        feed.innerHTML = `
    <div class="empty-state">
      <h3>No posts yet</h3>
      <p>Be the first to share something 🚀</p>
      <button onclick="openPostModal()">Create Post</button>
    </div>
  `;
    }else{
        feed.innerHTML = `<div class="card add-post">
    <input placeholder="Share something..." onclick="openPostModal()">
  </div>`;
        posts.forEach(p=>{
            feed.innerHTML += `
      <div class="card">
        <span class="badge">${p.category}</span>
        <h3>${p.title}</h3>
        <p>${p.content}</p>
        <div class="actions">
          <span onclick="toggleComment(this)">💬 Comment</span>
          <span>🔁 Share</span>
        </div>
        <div class="comment-box hidden">
          <textarea placeholder="Write a comment..."></textarea>
          <div class="comment-actions">
            <button class="comment-btn">Post</button>
          </div>
        </div>
      </div>`;
        });
    }

    function toggleComment(el){
        el.parentElement.nextElementSibling.classList.toggle("hidden");
    }

    /* ESC close */
    document.addEventListener("keydown",e=>{
        if(e.key==="Escape") closePostModal();
    });
</script>

</body>
</html>
